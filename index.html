<div style={{fontSize:12,color:T.textMuted,marginBottom:12,lineHeight:1.5}}>Anything you delete waits here for <strong style={{color:T.text}}>30 days</strong> before it's gone for good. Deleted by mistake? Restore it.</div>
{trash.length===0?(
  <div style={{fontSize:12,color:T.textFaint,fontStyle:'italic',marginBottom:8,padding:'14px 0',textAlign:'center'}}>Trash is empty — nothing deleted recently.</div>
):(<>
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
    <div style={{fontSize:11,color:T.textMuted,fontWeight:700}}>{trash.length} item{trash.length!==1?'s':''} recoverable</div>
    <button onClick={onEmptyTrash} style={{fontSize:11,fontWeight:700,color:T.danger,background:'none',border:`1px solid ${T.danger}44`,borderRadius:6,padding:'3px 9px',cursor:'pointer'}}>Empty trash</button>
  </div>
  <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:6}}>
    {trash.slice().sort((a,b)=>new Date(b.deletedAt)-new Date(a.deletedAt)).map(x=>{
      const days=Math.max(0,30-Math.floor((Date.now()-new Date(x.deletedAt).getTime())/86400000));
      const it=x.item||{};
      const label=x.kind==='entry'?((it.client||it.description||'Income entry')):x.kind==='receipt'?((it.description||'Receipt')):((it.invoiceNum?'Invoice '+it.invoiceNum:'')||it.client||'Invoice');
      const amt=x.kind==='invoice'?(it.subtotal||0):(it.subtotal!==undefined?it.subtotal:(it.amount||0));
      return(<div key={x.tid} style={{display:'flex',alignItems:'center',gap:10,background:'#f2f1ea',border:`1px solid ${T.border}`,borderRadius:10,padding:'9px 11px'}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:T.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{label}{amt?<span style={{color:T.textMuted,fontWeight:400}}> · {fmt(amt)}</span>:null}</div>
          <div style={{fontSize:10,color:T.textFaint,marginTop:2,textTransform:'capitalize'}}>{x.kind} · {days} day{days!==1?'s':''} left</div>
        </div>
        <button onClick={()=>onRestoreTrash(x.tid)} style={{fontSize:11,fontWeight:700,color:T.lumpGreen,background:'none',border:`1px solid ${T.lumpGreen}44`,borderRadius:6,padding:'4px 10px',cursor:'pointer',flexShrink:0}}>Restore</button>
        <button onClick={()=>onPurgeTrashItem(x.tid)} style={{fontSize:11,fontWeight:700,color:T.textFaint,background:'none',border:`1px solid ${T.border}`,borderRadius:6,padding:'4px 8px',cursor:'pointer',flexShrink:0}}>✕</button>
      </div>);
    })}
  </div>
</>)}
<Hr/>
<Lbl>Clear data</Lbl>
<div style={{fontSize:12,color:T.textMuted,marginBottom:12,lineHeight:1.5}}>Each button asks first, then moves everything to <strong style={{color:T.text}}>Trash</strong> — recoverable for 30 days.</div>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
  <Btn small outline color={T.danger} onClick={onClearEntries}>Clear Entries</Btn>
  <Btn small outline color={T.danger} onClick={onClearReceipts}>Clear Receipts</Btn>
  <Btn small outline color={T.danger} onClick={onClearInvoices}>Clear Invoices</Btn>
</div>
</Page>);}

// ── NAV ──────────────────────────────────────────────────────────────────────
function Nav({view,setView,onSnap}){
const tabs=[['home','home','Home'],['log','list','Log'],['invoice','invoice','Invoice'],['receipts','receipt','Receipts'],['snap','camera','Snap']];
return(<div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,background:T.surface,borderTop:`1px solid ${T.border}`,display:'grid',gridTemplateColumns:`repeat(${tabs.length},1fr)`,zIndex:100}}>{tabs.map(([id,icon,label])=>{const a=view===id;return <button key={id} onClick={()=>id==='snap'?onSnap():setView(id)} style={{background:'none',border:'none',padding:'9px 1px 7px',display:'flex',flexDirection:'column',alignItems:'center',gap:2,color:a?T.accent:T.textMuted}}><I n={icon} sz={18} c={a?T.accent:T.textMuted}/><span style={{fontSize:9,fontWeight:700}}>{label}</span></button>;})}</div>);}

// ── APP ──────────────────────────────────────────────────────────────────────
function App(){
const[view,setView]=useState('home');
const[addType,setAddType]=useState('timed');
const camGlobalRef=useRef();
const[pendingFile,setPendingFile]=useState(null);
const snapPhoto=()=>{if(camGlobalRef.current)camGlobalRef.current.click();};
const[ingesting,setIngesting]=useState(false);
const[ingestMsg,setIngestMsg]=useState('');
const[ingestFound,setIngestFound]=useState(null);
const[entries,setEntries]=useState([]);
const[receipts,setReceipts]=useState([]);
const[invoices,setInvoices]=useState([]);
const[clients,setClients]=useState([]);
const[trash,setTrash]=useState(()=>{const t=LS.get('mhq-trash')||[];const cut=Date.now()-30*86400000;return t.filter(x=>x.deletedAt&&new Date(x.deletedAt).getTime()>cut);});
useEffect(()=>{LS.set('mhq-trash',trash);},[trash]);
const TRASH_MS=30*86400000;
const[settings,setSettings]=useState({name:'',business:'',email:'',bankDetails:'',defaultRate:35,sheetsUrl:'',payRef:'PAYMENT REF: PTF',invoiceCounter:1,anthropicKey:'',taxPercent:20,holidayPayPercent:12.07});
const[syncStatus,setSyncStatus]=useState('loading');
const[loaded,setLoaded]=useState(false);
const[booted,setBooted]=useState(false);
const syncTimer=useRef(null);
const pollTimer=useRef(null);
const[lastSynced,setLastSynced]=useState(null);
const isSaving=useRef(false);
const sheetHydrated=useRef(false); // true once we've successfully READ the sheet — guards against empty-state overwrite
const[aligning,setAligning]=useState(false);
const[alignResult,setAlignResult]=useState(null); // {matched,uninvoiced,untagged,restored,balance,err,at}

useEffect(()=>{
  (async()=>{
    const localSettings=LS.get('mhq-settings');
    const url=localSettings?.sheetsUrl||'';
    if(localSettings)setSettings(s=>({...s,...localSettings}));
    // Paint the UI immediately from local data — Sheets sync continues in the background
    setEntries(LS.get('mhq-entries')||[]);setReceipts(LS.get('mhq-receipts')||[]);setInvoices(LS.get('mhq-invoices')||[]);setClients(LS.get('mhq-clients')||[]);
    setBooted(true);
    if(url){
      Sheets.init(url);setSyncStatus('loading');
      const sd=await Sheets.load();
      if(sd&&Array.isArray(sd.entries)){
        const lr=LS.get('mhq-receipts')||[];
        const merged=(sd.receipts||[]).map(r=>{const l=lr.find(x=>x.id===r.id);return l?.imageData?{...r,imageData:l.imageData}:r;});
        setEntries(sd.entries||[]);setReceipts(merged);setInvoices(sd.invoices||[]);setClients(sd.clients||[]);
        if(sd.settings)setSettings(s=>({...s,...sd.settings}));
        sheetHydrated.current=true;
        setSyncStatus('synced');
      }else{
        setSyncStatus('error');
      }
    }else{
      setSyncStatus('local');
    }
    setLoaded(true);
  })();
},[]);

useEffect(()=>{
  if(!loaded)return;
  LS.set('mhq-entries',entries);LS.set('mhq-receipts',receipts);LS.set('mhq-invoices',invoices);LS.set('mhq-clients',clients);LS.set('mhq-settings',settings);
  const url=settings.sheetsUrl;
  if(!url){setSyncStatus('local');return;}
  // Never push an empty state to a sheet we haven't successfully read yet — protects existing sheet data on a fresh device
  if(!sheetHydrated.current&&entries.length===0&&receipts.length===0&&invoices.length===0){setSyncStatus('error');return;}
  clearTimeout(syncTimer.current);
  setSyncStatus('saving');
  syncTimer.current=setTimeout(async()=>{
    if(isSaving.current)return;
    isSaving.current=true;
    Sheets.init(url);
    const ok=await Sheets.save({entries,receipts,invoices,clients,settings});
    if(ok)setLastSynced(new Date());
    setSyncStatus(ok?'synced':'error');
    isSaving.current=false;
  },2500);
},[entries,receipts,invoices,clients,settings,loaded]);

useEffect(()=>{
  if(!loaded||!settings.sheetsUrl)return;
  const poll=async()=>{
    if(document.hidden||isSaving.current||syncStatus==='saving')return;
    Sheets.init(settings.sheetsUrl);
    const sd=await Sheets.load();
    if(!sd||!Array.isArray(sd.entries))return;
    const remoteKey=(sd.entries||[]).slice(0,3).map(e=>e.id).join(',');
    const localKey=entries.slice(0,3).map(e=>e.id).join(',');
    if(remoteKey===localKey&&(sd.invoices||[]).length===invoices.length&&(sd.receipts||[]).length===receipts.length)return;
    const lr=LS.get('mhq-receipts')||[];
    const merged=(sd.receipts||[]).map(r=>{const l=lr.find(x=>x.id===r.id);return l?.imageData?{...r,imageData:l.imageData}:r;});
    setEntries(sd.entries||[]);setReceipts(merged);setInvoices(sd.invoices||[]);
    if(sd.clients)setClients(sd.clients);
    if(sd.settings)setSettings(s=>({...s,...sd.settings}));
    sheetHydrated.current=true;
    setLastSynced(new Date());setSyncStatus('synced');
  };
  clearInterval(pollTimer.current);
  pollTimer.current=setInterval(poll,60000);
  return()=>clearInterval(pollTimer.current);
},[loaded,settings.sheetsUrl]);

const syncFromSheets=async()=>{
  if(!settings.sheetsUrl)return false;
  Sheets.init(settings.sheetsUrl);setSyncStatus('loading');
  const sd=await Sheets.load();
  if(sd&&Array.isArray(sd.entries)){
    const lr=LS.get('mhq-receipts')||[];
    const merged=(sd.receipts||[]).map(r=>{const l=lr.find(x=>x.id===r.id);return l?.imageData?{...r,imageData:l.imageData}:r;});
    setEntries(sd.entries||[]);setReceipts(merged);setInvoices(sd.invoices||[]);
    if(sd.clients)setClients(sd.clients);
    if(sd.settings)setSettings(s=>({...s,...sd.settings}));
    sheetHydrated.current=true;
    setSyncStatus('synced');setLastSynced(new Date());return true;
  }else{setSyncStatus('error');return false;}
};

// migration: stamp invoiceId on entries already in saved invoices
useEffect(()=>{
  if(!booted)return;
  setEntries(p=>{
    const map={};
    invoices.forEach(inv=>(inv.entryIds||[]).forEach(eid=>{if(!map[eid])map[eid]=inv.id;}));
    if(!Object.keys(map).length)return p;
    let changed=false;
    const next=p.map(e=>{if(!e.invoiceId&&map[e.id]){changed=true;return{...e,invoiceId:map[e.id]};}return e;});
    return changed?next:p;
  });
},[booted]);
const testConn=async()=>{Sheets.init(settings.sheetsUrl||'');return await Sheets.testDiag();};

// ── Align everything: scan the Honey folders, AI-read new files, review, then write ──
const runFolderAlign=async()=>{
  if(ingesting)return;
  if(!settings.sheetsUrl){setIngestMsg('Connect your Honey sheet in Settings first.');setTimeout(()=>setIngestMsg(''),4000);return;}
  if(!settings.anthropicKey){setIngestMsg('Add your Anthropic key in Settings → AI Scan Key first.');setTimeout(()=>setIngestMsg(''),4500);return;}
  setIngesting(true);setIngestFound(null);setIngestMsg('Scanning your Honey folders…');
  Sheets.init(settings.sheetsUrl);
  const seen=[];const files=[];
  while(true){
    let res=null;try{res=await Sheets.scanFolders(seen.join(','));}catch(e){}
    if(!res||res.error){
      if(files.length===0){setIngesting(false);setIngestMsg('Could not reach the script'+(res&&res.error?': '+res.error:'')+'.');setTimeout(()=>setIngestMsg(''),5000);return;}
      break;
    }
    const batch=res.files||[];
    if(!batch.length)break;
    batch.forEach(b=>{files.push(b);seen.push(b.fileId);});
    setIngestMsg('Found '+files.length+' file'+(files.length===1?'':'s')+'…');
    if(batch.length<12||files.length>=200)break;
  }
  if(!files.length){setIngesting(false);setIngestMsg('No new files found — everything in your folders is already logged.');setTimeout(()=>setIngestMsg(''),5000);return;}
  const cands=[];
  for(let i=0;i<files.length;i++){
    setIngestMsg('Reading '+(i+1)+' of '+files.length+'…');
    const fl=files[i];const isPdf=fl.mimeType==='application/pdf';
    let p=null;try{p=await aiScanImage(fl.imageData,isPdf,settings.anthropicKey);}catch(e){}
    cands.push(p&&p.amount?{...fl,date:p.date,amount:p.amount,vendor:p.vendor,description:p.description||p.vendor,subcategory:p.subcategory,ok:true}:{...fl,ok:false});
  }
  const acceptedInBatch=[];
  cands.forEach(c=>{
    if(!(c.ok&&c.amount)){c.dup=false;return;}
    let dup;
    if(c.folder==='invoice')dup=invoices.some(iv=>Math.abs((iv.subtotal||0)-c.amount)<0.02&&datesClose(iv.date,c.date));
    else dup=receipts.some(r=>r.category===c.folder&&Math.abs((r.amount||0)-c.amount)<0.02&&datesClose(r.date,c.date));
    // Also dedup against other candidates already accepted in THIS scan — so duplicate image
    // files of the same receipt collapse to a single row instead of one row per copy.
    if(!dup)dup=acceptedInBatch.some(a=>a.folder===c.folder&&Math.abs((a.amount||0)-c.amount)<0.02&&datesClose(a.date,c.date)&&(a.description||a.vendor||'').toLowerCase().trim()===(c.description||c.vendor||'').toLowerCase().trim());
    c.dup=dup;
    if(!dup)acceptedInBatch.push(c);
  });
  setIngesting(false);setIngestMsg('');setIngestFound(cands);
};
const confirmIngest=()=>{
  (ingestFound||[]).filter(c=>c.ok&&c.amount&&!c.dup).forEach(c=>{
    if(c.folder==='invoice'){
      addI({id:mkId(),invoiceNum:'IMP-'+mkId().slice(-5).toUpperCase(),date:(c.date?new Date(c.date+'T12:00:00').toISOString():new Date().toISOString()),client:c.vendor||'Client',clientEmail:'',subtotal:c.amount,incomeTotal:c.amount,reimbTotal:0,deductTotal:0,deductions:[],dueDate:'',entryIds:[],reimbIds:[],docUrl:c.driveUrl,status:'unpaid'});
    }else{
      addR({date:c.date||today(),description:c.description||c.vendor||'Receipt',amount:c.amount,category:c.folder,subcategory:c.folder==='business'?(c.subcategory||'other'):null,paidBy:'',owedBy:'',notes:'Imported by Align everything',status:'logged',driveUrl:c.driveUrl,imageName:c.name});
    }
  });
  setIngestFound(null);
};

// ── FIX: go() accepts optional addType override — quick-add buttons pass their type ──
const go=(v,type)=>{
  if(v==='add') setAddType(type||'timed');
  setView(v);
};

const addE=e=>setEntries(p=>[{...e,id:mkId(),invoiceId:e.invoiceId||null,createdAt:new Date().toISOString()},...p]);
const updE=(id,patch)=>setEntries(p=>p.map(e=>e.id===id?{...e,...patch}:e));
const toTrash=(kind,items)=>{if(!items.length)return;const now=new Date().toISOString();setTrash(p=>[...items.map(it=>({tid:mkId(),kind,deletedAt:now,item:it})),...p]);};
const delE=id=>setEntries(p=>{const v=p.find(e=>e.id===id);if(v)toTrash('entry',[v]);return p.filter(e=>e.id!==id);});
const toggleStatus=id=>setEntries(p=>p.map(e=>e.id===id?{...e,status:e.status==='Paid'?'Pending':'Paid'}:e));
const toggleVoid=id=>setEntries(p=>p.map(e=>e.id===id?{...e,status:e.status==='Void'?'Pending':'Void'}:e));
const addR=r=>{const id=mkId();setReceipts(p=>[{...r,id,createdAt:new Date().toISOString()},...p]);return id;};
const updR=(id,patch)=>setReceipts(p=>p.map(r=>r.id===id?{...r,...patch}:r));
const delR=id=>setReceipts(p=>{const v=p.find(r=>r.id===id);if(v)toTrash('receipt',[v]);return p.filter(r=>r.id!==id);});
const addI=inv=>setInvoices(p=>[{...inv,id:inv.id||mkId()},...p]);
const updI=(id,patch)=>setInvoices(p=>p.map(i=>i.id===id?{...i,...patch}:i));
const delI=id=>setInvoices(p=>{const v=p.find(i=>i.id===id);if(v)toTrash('invoice',[v]);return p.filter(i=>i.id!==id);});
const addClient=c=>setClients(p=>[{...c,id:mkId()},...p]);
const delClient=id=>setClients(p=>p.filter(c=>c.id!==id));
// ── Transfer from the old Freelance Tracker (read-only: never writes ft-* keys) ──
const[oldDataAvailable]=useState(()=>!!((LS.get('ft-entries')||[]).length||(LS.get('ft-invoices')||[]).length||(LS.get('ft-receipts')||[]).length));
const importOld=(data,allTime)=>{
  const cut=allTime?'0000-00-00':TAX_YEAR_START;
  const dOk=d=>String(d||'').slice(0,10)>=cut;
  const eIds=new Set(entries.map(e=>e.id)),rIds=new Set(receipts.map(r=>r.id)),iIds=new Set(invoices.map(i=>i.id)),cIds=new Set(clients.map(c=>c.id)),cNames=new Set(clients.map(c=>(c.name||'').toLowerCase()));
  const ne=(data.entries||[]).filter(e=>dOk(e.date)&&!eIds.has(e.id)).map(e=>({...e,imported:true}));
  const nr=(data.receipts||[]).filter(r=>dOk(r.date)&&!rIds.has(r.id)).map(r=>({...r,imageData:null,imported:true}));
  const ni=(data.invoices||[]).filter(i=>dOk(i.date)&&!iIds.has(i.id)).map(i=>({...i,imported:true}));
  const nc=(data.clients||[]).filter(c=>!cIds.has(c.id)&&!cNames.has((c.name||'').toLowerCase()));
  if(ne.length)setEntries(p=>[...ne,...p]);
  if(nr.length)setReceipts(p=>[...nr,...p]);
  if(ni.length)setInvoices(p=>[...ni,...p]);
  if(nc.length)setClients(p=>[...nc,...p]);
  let gotSettings=false;
  if(data.settings){
    const s=data.settings;
    const keep=['name','business','email','bankDetails','payRef','anthropicKey','taxPercent','holidayPayPercent','defaultRate'];
    setSettings(prev=>{
      const out={...prev};
      keep.forEach(k=>{const empty=out[k]===''||out[k]===undefined||out[k]===null;if(s[k]!==undefined&&s[k]!==''&&s[k]!==null&&empty)out[k]=s[k];});
      // never copy sheetsUrl — Honey gets its own fresh spreadsheet
      out.invoiceCounter=Math.max(prev.invoiceCounter||1,s.invoiceCounter||1);
      return out;
    });
    gotSettings=true;
  }
  return{entries:ne.length,receipts:nr.length,invoices:ni.length,clients:nc.length,settings:gotSettings};
};
const clearEntries=()=>{if(window.confirm('Move ALL income entries to Trash? You can restore them for 30 days.')){toTrash('entry',entries);setEntries([]);}};
const clearReceipts=()=>{if(window.confirm('Move ALL receipts to Trash? You can restore them for 30 days.')){toTrash('receipt',receipts);setReceipts([]);}};
const clearInvoices=()=>{if(window.confirm('Move ALL invoice records to Trash? You can restore them for 30 days.')){toTrash('invoice',invoices);setInvoices([]);}};
const restoreTrash=tid=>{const v=trash.find(x=>x.tid===tid);if(!v)return;if(v.kind==='entry')setEntries(p=>p.some(e=>e.id===v.item.id)?p:[v.item,...p]);else if(v.kind==='receipt')setReceipts(p=>p.some(r=>r.id===v.item.id)?p:[v.item,...p]);else if(v.kind==='invoice')setInvoices(p=>p.some(i=>i.id===v.item.id)?p:[v.item,...p]);setTrash(p=>p.filter(x=>x.tid!==tid));};
const purgeTrashItem=tid=>setTrash(p=>p.filter(x=>x.tid!==tid));
const emptyTrash=()=>{if(window.confirm('Permanently delete everything in Trash? This cannot be undone.'))setTrash([]);};

if(!booted){return(<div style={{background:T.bg,minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,color:T.textMuted}}><div style={{width:36,height:36,border:`3px solid ${T.border}`,borderTopColor:T.accent,borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/><div style={{fontSize:13,fontWeight:700,letterSpacing:1}}>Loading…</div></div>);}

return(<div style={{background:T.bg,minHeight:'100vh',maxWidth:480,margin:'0 auto',fontFamily:'"DM Sans",-apple-system,sans-serif',color:T.text,paddingBottom:72,overflowX:'hidden'}}>
  {view==='home'&&<HomeView entries={entries} receipts={receipts} invoices={invoices} setView={go} syncStatus={syncStatus} lastSynced={lastSynced} onSync={syncFromSheets} onAlign={runFolderAlign} aligning={ingesting} alignResult={alignResult} sheetsUrl={settings.sheetsUrl} settings={settings} oldDataAvailable={oldDataAvailable}/>}
  {view==='add'&&<AddView onAdd={addE} settings={settings} initialType={addType} back={()=>setView('home')} onAddInvoice={addI} invoiceCounter={settings.invoiceCounter||1}/>}
  {view==='log'&&<LogView entries={entries} invoices={invoices} onDelete={delE} onToggleStatus={toggleStatus} onToggleVoid={toggleVoid} onAdd={addE}/>}
  {view==='receipts'&&<ReceiptsView receipts={receipts} onAdd={addR} onUpdate={updR} onDelete={delR} settings={settings} sheetsUrl={settings.sheetsUrl} onSync={syncFromSheets} pendingFile={pendingFile} onConsumePending={()=>setPendingFile(null)}/>}
  {view==='invoice'&&<InvoiceView entries={entries} receipts={receipts} invoices={invoices} clients={clients} onAddInvoice={addI} onUpdateInvoice={updI} onDeleteInvoice={delI} onUpdateReceipt={updR} onUpdateEntry={updE} onSaveClient={addClient} onAddEntry={addE} settings={settings} setSettings={setSettings} sheetsUrl={settings.sheetsUrl}/>}
  {view==='reports'&&<ReportsView entries={entries} receipts={receipts} invoices={invoices} settings={settings}/>}
  {view==='settings'&&<SettingsView settings={settings} setSettings={setSettings} syncStatus={syncStatus} onTest={testConn} onSyncFromSheets={syncFromSheets} clients={clients} onAddClient={addClient} onDelClient={delClient} onClearEntries={clearEntries} onClearReceipts={clearReceipts} onClearInvoices={clearInvoices} onImportOld={importOld} trash={trash} onRestoreTrash={restoreTrash} onPurgeTrashItem={purgeTrashItem} onEmptyTrash={emptyTrash}/>}
  {ingestMsg&&<div style={{position:'fixed',bottom:84,left:'50%',transform:'translateX(-50%)',background:T.text,color:T.bg,padding:'10px 16px',borderRadius:12,fontSize:13,fontWeight:700,zIndex:300,maxWidth:'88%',textAlign:'center',boxShadow:'0 6px 20px rgba(0,0,0,.22)'}}>{ingestMsg}</div>}
  {ingestFound&&(()=>{const neu=ingestFound.filter(c=>c.ok&&c.amount&&!c.dup);const dups=ingestFound.filter(c=>c.ok&&c.amount&&c.dup);const bad=ingestFound.filter(c=>!(c.ok&&c.amount));const tot=neu.reduce((a,c)=>a+(c.amount||0),0);return(
  <div onClick={()=>setIngestFound(null)} style={{position:'fixed',inset:0,background:'rgba(26,26,26,.55)',zIndex:250,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.surface,borderTopLeftRadius:18,borderTopRightRadius:18,width:'100%',maxWidth:480,maxHeight:'82vh',overflowY:'auto',padding:'18px 18px 26px'}}>
      <div style={{fontFamily:'Space Mono,monospace',fontSize:18,fontWeight:700,marginBottom:3}}>Found in your folders</div>
      <div style={{fontSize:13,color:T.textMuted,marginBottom:14}}>{neu.length} new · {fmt(tot)}{dups.length?' · '+dups.length+' already in Honey':''}{bad.length?' · '+bad.length+" couldn't read":''}</div>
      {ingestFound.map((c,i)=>{const isNew=c.ok&&c.amount&&!c.dup;const isDup=c.ok&&c.amount&&c.dup;const bg=isNew?T.bg:isDup?T.lumpGreen+'12':T.danger+'10';const bd=isNew?T.border:isDup?T.lumpGreen+'44':T.danger+'44';return(<div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,padding:'9px 11px',marginBottom:7,borderRadius:10,background:bg,border:`1px solid ${bd}`,opacity:isDup?.7:1}}>
        <div style={{minWidth:0}}>
          <div style={{fontWeight:700,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.ok&&c.amount?(c.vendor||c.description||c.name):c.name}</div>
          <div style={{fontSize:11,color:T.textMuted}}>{c.folder==='invoice'?'Invoice':c.folder==='reimbursable'?'Reimbursable':'Business'}{c.date?' · '+c.date:''}{isDup?' · already logged':!isNew?' · couldn’t read — add manually':''}</div>
        </div>
        <div style={{fontFamily:'Space Mono,monospace',fontSize:14,fontWeight:700,flexShrink:0,color:isNew?T.text:isDup?T.lumpGreen:T.danger}}>{c.ok&&c.amount?(isDup?'✓ ':'')+fmt(c.amount):'—'}</div>
      </div>);})}
      <div style={{display:'flex',gap:10,marginTop:10}}>
        <button onClick={()=>setIngestFound(null)} style={{flex:1,background:'none',border:`1.5px solid ${T.border}`,borderRadius:12,padding:'12px',fontWeight:700,color:T.textMuted,fontSize:14}}>Cancel</button>
        <button onClick={confirmIngest} disabled={neu.length===0} style={{flex:2,background:neu.length?T.accent:T.border,color:neu.length?'#fff':T.textMuted,border:'none',borderRadius:12,padding:'12px',fontWeight:700,fontSize:14,opacity:neu.length?1:.6}}>{neu.length?'Add '+neu.length+' to Honey':'Nothing new to add'}</button>
      </div>
    </div>
  </div>);})()}
  <input ref={camGlobalRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>{const file=e.target.files&&e.target.files[0];e.target.value='';if(file){setPendingFile(file);go('receipts');}}}/>
  <button onClick={()=>go(view==='settings'?'home':'settings')} aria-label="Settings" style={{position:'fixed',top:10,right:'max(14px,calc(50% - 226px))',zIndex:160,width:38,height:38,borderRadius:'50%',background:T.surface,border:`1px solid ${T.border}`,boxShadow:'0 1px 4px rgba(0,0,0,.10)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}><I n={view==='settings'?'chevL':'settings'} sz={20} c={view==='settings'?T.accent:T.textMuted}/></button>
  <Nav view={view} setView={go} onSnap={snapPhoto}/>
</div>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Passcode gate
const GATE_KEY='honey_auth';
const GATE_HASH='3d73cd5cb74f8ab1d4496133cde249d9825e0f19d0f1a011f46afc287f881299';
async function checkGate(){
  const val=document.getElementById('gateInput').value;
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
  const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hash===GATE_HASH){
    localStorage.setItem(GATE_KEY,'1');
    document.getElementById('gateOverlay').style.display='none';
  } else {
    document.getElementById('gateErr').style.visibility='visible';
    document.getElementById('gateInput').value='';
    document.getElementById('gateInput').focus();
  }
}
document.getElementById('gateInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkGate();});
if(!localStorage.getItem(GATE_KEY)){
  document.getElementById('gateOverlay').style.display='flex';
  setTimeout(()=>document.getElementById('gateInput').focus(),50);
} else {
  document.getElementById('gateOverlay').style.display='none';
}
</script>
