// ── A calm, sophisticated year-end workbook: Summary · Income · Expenses ──

const XW={ink:'2E2A33',sub:'6E6878',paper:'FBFAF7',band:'F3F1EC',line:'E3DFD6',gold:'B8860B',goldSoft:'F4EDD8',green:'2E6F4E',rust:'9C5A2C'};
const xCell=(v,o={})=>{const s={font:{name:'Calibri',sz:11,color:{rgb:o.color||XW.ink},bold:!!o.bold,italic:!!o.italic},alignment:{horizontal:o.align||(typeof v==='number'?'right':'left'),vertical:'center',wrapText:!!o.wrap},fill:o.fill?{patternType:'solid',fgColor:{rgb:o.fill}}:undefined,border:o.border===false?undefined:{bottom:{style:'thin',color:{rgb:XW.line}}}};if(typeof v==='number'&&o.money!==false)s.numFmt='£#,##0.00';if(o.numFmt)s.numFmt=o.numFmt;const cell={v:v??'',t:typeof v==='number'?'n':'s',s};if(o.link){cell.l={Target:o.link,Tooltip:'Open'};cell.s.font.color={rgb:'2A6FB0'};cell.s.font.underline=true;}return cell;};
const buildYearWorkbook=async({year,period,biz,summary,income,expenses,catTotals})=>{
  const XLSX=await loadXLSX();

  // ── Expenses ──
e  const expHead=['Date','Description','Category','Amount','Receipt'];

const exportYearEnd=async()=>{
  const year=new Date().getFullYear();
  const period=`6 Apr ${year-1} – 5 Apr ${year}`;
  const biz=settings.name||settings.business||'Your Business';
  const gross=entries.reduce((s,e)=>s+(e.gross||0),0);
  const exp=receipts.reduce((s,r)=>s+(r.amount||0),0);
  const profit=Math.max(0,gross-exp);
  const taxStash=Math.round(profit*0.2*100)/100;
  const summary={gross,expenses:exp,profit,taxStash};
  const income=entries.filter(e=>e.status!=='Void').map(e=>({date:e.date,client:e.client,invoiceRef:e.invoiceRef||'',description:e.description,gross:e.gross||0,hours:e.hours||0,rate:e.rate||0,status:e.status||''})).sort((a,b)=>b.date.localeCompare(a.date));
  const expenses=receipts.map(r=>({date:r.date,description:r.description,category:catLabel(r.subcategory||r.category),amount:r.amount,link:r.driveUrl||''})).sort((a,b)=>b.date.localeCompare(a.date));
  const catTotals={};
  receipts.forEach(r=>{const k=r.subcategory||r.category||'other';catTotals[k]=(catTotals[k]||0)+(r.amount||0);});
  const wb=await buildYearWorkbook({year,period,biz,summary,income,expenses,catTotals});
  const XLSX=await loadXLSX();
  XLSX.writeFile(wb, `Honey_YearEnd_${year-1}-${year}.xlsx`);
};

  const overlay = document.getElementById('gateOverlay');
  if(!overlay) return;

  // If already unlocked this browser, hide immediately
  if(localStorage.getItem(GATE_KEY) === '1'){
    overlay.style.display = 'none';
    return;
  }

  // Build numeric keypad
  const pad = document.getElementById('gatePad');
  const err = document.getElementById('gateErr');
  const title = document.getElementById('gateTitle');
  const sub = document.getElementById('gateSub');
  let pin = '';

  const updateDots = () => {
    const dots = document.getElementById('gateDots');
    dots.innerHTML = '';
    for(let i=0; i<4; i++){
      const d = document.createElement('div');
      d.style.cssText = `width:14px;height:14px;border-radius:50%;background:${i < pin.length ? '#E0A92E' : '#3A3730'};border:1px solid #5C574B`;
      dots.appendChild(d);
    }
  };

  const press = (num) => {
    if(pin.length < 4){
      pin += num;
      updateDots();
      if(pin.length === 4){
        checkPin();
      }
    }
  };

  const checkPin = async () => {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if(hash === GATE_HASH){
      localStorage.setItem(GATE_KEY, '1');
      overlay.style.transition = 'opacity .2s';
      overlay.style.opacity = '0';
      setTimeout(() => { overlay.style.display = 'none'; overlay.style.opacity = '1'; }, 200);
    } else {
      err.style.visibility = 'visible';
      setTimeout(() => {
        pin = '';
        updateDots();
        err.style.visibility = 'hidden';
      }, 800);
    }
  };

  // Build  keypad buttons
  const keys = ['1','2','3','4','5','6','7','8','9','⌫','0','✓'];
  keys.forEach(k => {
    const btn = document.createElement('button');
    btn.textContent = k;
    btn.style.cssText = `width:72px;height:58px;border-radius:12px;border:1px solid #3A3730;background:#1F1D18;color:#F2EEE3;font-size:22px;font-weight:600;cursor:pointer;`;
    if(k === '⌫') btn.style.fontSize = '18px';
    if(k === '✓') btn.style.background = '#E0A92E', btn.style.color = '#16140F';
    btn.onclick = () => {
      if(k === '⌫'){ pin = pin.slice(0,-1); updateDots(); }
      else if(k === '✓'){ if(pin.length === 4) checkPin(); }
      else press(k);
    };
    pad.appendChild(btn);
  });

  updateDots();

  // Forgot PIN button
  document.getElementById('gateForgot').onclick = () => {
    if(confirm('To reset PIN, clear your browser data for this site (or contact support). Continue?')){
      localStorage.removeItem(GATE_KEY);
      location.reload();
    }
  };

  // Show the gate
  overlay.style.display = 'flex';
}

setupGate();
</script>
</body>
</html>
