const aiScanImage=async(dataUrl,isPdf)=>{

  async createInvoice(inv,settings){if(!this._url)return null;try{const slim={invoiceNum:inv.invoiceNum,client:inv.client,clientEmail:inv.clientEmail||'',clientAddress:inv.clientAddress||'',dueDate:inv.dueDate||'',notes:inv.notes||'',grandTotal:inv.grandTotal,incomeTotal:inv.incomeTotal||0,reimbTotal:inv.reimbTotal||0,payRef:settings.payRef||'',invoicePeriod:inv.invoicePeriod||'',entries:(inv.selEntries||[]).map(e=>({date:e.date,client:e.client||'',description:e.description||'',subtotal:e.subtotal,hours:e.hours||0,rate:e.rate||0,type:e.type})),reimbs:(inv.selReimbs||[]).map(r=>({date:r.date,description:r.description||'',amount:r.amount,driveUrl:r.driveUrl||''}))};const payload={invoice:slim,settings:{name:settings.name||'',business:settings.business||'',email:settings.email||'',payRef:settings.payRef||''}};const encoded=encodeURIComponent(JSON.stringify(payload));if(encoded.length>7000)return{err:'Invoice data too large for URL.'};const d=await this._jsonp(this._url+'?action=createInvoice&data='+encoded,30000);if(d?.url)return{url:d.url};return{err:d?.error||'No URL returned'};}catch(e){return{err:e.message||'Failed'};}},

const TAX_YEAR_START=(()=>{const n=new Date();const y=(n.getMonth()<3||(n.getMonth()===3&&n.getDate()<6))?n.getFullYear()-1:n.getFullYear();return `${y}-04-06`;})();
const compressImg=file=>new Promise(resolve=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{URL.revokeObjectURL(url);const max=800,s=Math.min(max/Math.max(img.width,img.height),1);const c=document.createElement('canvas');c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);c.getContext('2d').drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',.68));};img.onerror=()=>resolve(null);img.src=url;});

const loadXLSX=()=>new Promise((res,rej)=>{if(window.XLSX){res(window.XLSX);return;}const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js';s.onload=()=>res(window.XLSX);s.onerror=()=>rej(new Error('Could not load the spreadsheet engine. Check your connection and try again.'));document.head.appendChild(s);});
// ── A calm, sophisticated year-end workbook: Summary · Income · Expenses ──
// Palette: warm ink on soft paper, one quiet gold accent. No loud fills.
const XW={ink:'2E2A33',sub:'6E6878',paper:'FBFAF7',band:'F3F1EC',line:'E3DFD6',gold:'B8860B',goldSoft:'F4EDD8',green:'2E6F4E',rust:'9C5A2C'};
const xCell=(v,o={})=>{const s={font:{name:'Calibri',sz:11,color:{rgb:o.color||XW.ink},bold:!!o.bold,italic:!!o.italic},alignment:{horizontal:o.align||(typeof v==='number'?'right':'left'),vertical:'center',wrapText:!!o.wrap},fill:o.fill?{patternType:'solid',fgColor:{rgb:o.fill}}:undefined,border:o.border===false?undefined:{bottom:{style:'thin',color:{rgb:XW.line}}}};if(typeof v==='number'&&o.money!==false)s.numFmt='£#,##0.00';if(o.numFmt)s.numFmt=o.numFmt;const cell={v:v??'',t:typeof v==='number'?'n':'s',s};if(o.link){cell.l={Target:o.link,Tooltip:'Open'};cell.s.font.color={rgb:'2A6FB0'};cell.s.font.underline=true;}return cell;};
const buildYearWorkbook=async({year,period,biz,summary,income,expenses,catTotals})=>{
  const XLSX=await loadXLSX();
  const wb=XLSX.utils.book_new();
  const title=t=>xCell(t,{bold:true,color:XW.ink,border:false});
  // ── Summary ──
  const sRows=[
    [xCell(biz||'Year-End Summary',{bold:true,color:XW.ink,border:false}),xCell('',{border:false})],
    [xCell(`UK Tax Year ${year}/${(year+1)%100}`,{color:XW.sub,border:false}),xCell('',{border:false})],
    [xCell(period,{italic:true,color:XW.sub,border:false}),xCell('',{border:false})],
    [xCell('',{border:false}),xCell('',{border:false})],
    [xCell('Gross income',{color:XW.sub}),xCell(summary.gross,{bold:true})],
    [xCell('Allowable business expenses',{color:XW.sub}),xCell(summary.expenses,{bold:true,color:XW.rust})],
    [xCell('Taxable profit',{bold:true}),xCell(summary.profit,{bold:true})],
    [xCell('Estimated tax to set aside (20%)',{color:XW.sub}),xCell(summary.taxStash,{bold:true,color:XW.green})],
  ];
  const ws1=XLSX.utils.aoa_to_sheet(sRows);
  ws1['!cols']=[{wch:38},{wch:16}];
  ws1['!merges']=[];
  // ── Income ──
  const incHead=['Date','Client','Invoice','Description','Hours','Rate','Gross','Status'];
  const iRows=[incHead.map(h=>xCell(h,{bold:true,color:'FFFFFF',fill:XW.ink,align:h==='Gross'||h==='Rate'||h==='Hours'?'right':'left'}))];
  income.forEach((e,i)=>{const f=i%2?XW.band:XW.paper;iRows.push([xCell(e.date,{fill:f}),xCell(e.client||'',{fill:f}),xCell(e.invoiceRef||'',{fill:f}),xCell(e.description||'',{fill:f,wrap:true}),xCell(e.hours||0,{fill:f,money:false,numFmt:'0.00'}),xCell(e.rate||0,{fill:f}),xCell(e.gross||0,{fill:f,bold:true}),xCell(e.status||'',{fill:f})]);});
  iRows.push([xCell('TOTAL',{bold:true,fill:XW.goldSoft}),xCell('',{fill:XW.goldSoft}),xCell('',{fill:XW.goldSoft}),xCell('',{fill:XW.goldSoft}),xCell('',{fill:XW.goldSoft}),xCell('',{fill:XW.goldSoft}),xCell(summary.gross,{bold:true,fill:XW.goldSoft,color:XW.ink}),xCell('',{fill:XW.goldSoft})]);
  const ws2=XLSX.utils.aoa_to_sheet(iRows);
  ws2['!cols']=[{wch:12},{wch:20},{wch:12},{wch:30},{wch:8},{wch:9},{wch:13},{wch:11}];
  ws2['!freeze']={xSplit:0,ySplit:1};ws2['!autofilter']={ref:`A1:H${income.length+1}`};
  // ── Expenses ──
  const expHead=['Date','Description','Category','Amount','Receipt'];
  const eRows=[expHead.map(h=>xCell(h,{bold:true,color:'FFFFFF',fill:XW.ink,align:h==='Amount'?'right':'left'}))];
  expenses.forEach((r,i)=>{const f=i%2?XW.band:XW.paper;eRows.push([xCell(r.date,{fill:f}),xCell(r.description||'',{fill:f,wrap:true}),xCell(r.category||'',{fill:f}),xCell(r.amount||0,{fill:f,bold:true,color:XW.rust}),r.link?xCell('View receipt',{fill:f,link:r.link}):xCell('',{fill:f})]);});
  eRows.push([xCell('TOTAL',{bold:true,fill:XW.goldSoft}),xCell('',{fill:XW.goldSoft}),xCell('',{fill:XW.goldSoft}),xCell(summary.expenses,{bold:true,fill:XW.goldSoft,color:XW.rust}),xCell('',{fill:XW.goldSoft})]);
  // category breakdown below
  eRows.push([xCell('',{border:false}),xCell('',{border:false}),xCell('',{border:false}),xCell('',{border:false}),xCell('',{border:false})]);
  eRows.push([xCell('By category',{bold:true,border:false}),xCell('',{border:false}),xCell('',{border:false}),xCell('',{border:false}),xCell('',{border:false})]);
  catTotals.forEach(([k,v])=>eRows.push([xCell(k,{color:XW.sub}),xCell('',{border:false}),xCell('',{border:false}),xCell(v,{color:XW.rust}),xCell('',{border:false})]));
  const ws3=XLSX.utils.aoa_to_sheet(eRows);
  ws3['!cols']=[{wch:12},{wch:34},{wch:20},{wch:13},{wch:16}];
  ws3['!freeze']={xSplit:0,ySplit:1};
  XLSX.utils.book_append_sheet(wb,ws1,'Summary');
  XLSX.utils.book_append_sheet(wb,ws2,'Income');
  XLSX.utils.book_append_sheet(wb,ws3,'Expenses');
  XLSX.writeFile(wb,`Year-End_${year}-${(year+1)%100}.xlsx`);

const overdueInvoices=invoices.filter(inv=>inv.status!=='paid'&&inv.dueDate&&new Date(inv.dueDate+'T12:00:00')<today0);
const overdueAmt=overdueInvoices.reduce((a,inv)=>a+(inv.subtotal||0),0);
const homePotsConfigured=false; // pot transfers removed — no "tax not potted" prompts
const needPotCount=homePotsConfigured?invoices.filter(i=>i.status==='paid'&&!i.potted&&i.paidDate&&(Date.now()-new Date(i.paidDate).getTime())<45*86400000).length:0;

return(<Page>

function AddView({onAdd,settings,initialType,back,onAddInvoice,invoiceCounter}){const[type,setType]=useState(initialType||'timed');const[form,setForm]=useState({date:today(),client:'',description:'',startTime:'',endTime:'',rate:settings.defaultRate||35,hours:'',amount:'',status:'Pending'});const[flash,setFlash]=useState(false);const[createInv,setCreateInv]=useState(true);const set=(k,v)=>setForm(f=>({...f,[k]:v}));const timedH=()=>{if(!form.startTime||!form.endTime)return 0;const[sh,sm]=form.startTime.split(':').map(Number);const[eh,em]=form.endTime.split(':').map(Number);return Math.max(0,(eh*60+em-sh*60-sm)/60);};const gross=type==='lump'?(parseFloat(form.amount)||0):(type==='timed'?timedH():(parseFloat(form.hours)||0))*(parseFloat(form.rate)||0);const tax=gross*TAX,net=gross-tax;const tc={timed:T.timed,manual:T.manual,lump:T.lumpGreen}[type];const handleAdd=()=>{if(gross<=0)return;const tmpId='e'+Date.now().toString(36)+Math.random().toString(36).slice(2);let invId=null;if(form.status==='Paid'&&createInv&&onAddInvoice){const yr=new Date().getFullYear();const num=String(invoiceCounter||1).padStart(3,'0');const invNum='INV-'+yr+'-'+num;const inv={invoiceNum:invNum,date:new Date().toISOString(),client:form.client||'',clientEmail:'',subtotal:gross,incomeTotal:gross,reimbTotal:0,deductTotal:0,deductions:[],dueDate:'',entryIds:[tmpId],reimbIds:[],docUrl:null,status:'paid',paidDate:new Date().toISOString()};onAddInvoice(inv);invId=invNum;}onAdd({type,date:form.date,client:form.client,description:form.description,invoiceRef:settings.payRef||undefined,rate:type!=='lump'?parseFloat(form.rate):null,hours:type==='timed'?timedH():type==='manual'?parseFloat(form.hours):null,startTime:type==='timed'?form.startTime:null,endTime:type==='timed'?form.endTime:null,subtotal:gross,tax,net,status:form.status,id:tmpId,invoiceId:invId});setFlash(true);setTimeout(()=>{setFlash(false);setForm({date:today(),client:'',description:'',startTime:'',endTime:'',rate:settings.defaultRate||35,hours ng:'6px 14px',fontSize:12,fontWeight:700,color:filter===v?T.accent:T.textMuted}}>{l}</button>))}</div>{filtered.length===0?<div style={{textAlign:'center',padding:'60px 20px',color:T.textMuted}}>No entries</div>:filtered.map(e=><EntryRow key={e.id} e={e} onDelete={onDelete} onToggleStatus={onToggleStatus} onToggleVoid={onToggleVoid} confId={confId} setConfId={setConfId} onLogAgain={handleLogAgain} invoiceNum={getInvNum(e.id)}/>)}</Page>);}

const[mode,setMode]=useState('list');

// Gmail import state

const fileRef=useRef(),camRef=useRef();

const handleFile=async file=>{
  if(!file)return;
  setScanned(false);setScanErr(null);
  if(file.type==='application/pdf'){
    const d=await readAsDataUrl(file);
    if(d)setImg({dataUrl:d,name:file.name||'receipt.pdf',isPdf:true});
  }else{
    let d=await compressImg(file);
    if(!d)d=await readAsDataUrl(file); // fallback for HEIC, unusual formats
    if(d)setImg({dataUrl:d,name:file.name||'receipt.jpg',isPdf:false});
  }
};
useEffect(()=>{if(pendingFile){setMode('add');handleFile(pendingFile);onConsumePending&&onConsumePending();}},[pendingFile]);

const loadTesseract=()=>new Promise((res,rej)=>{if(window.Tesseract){res(window.Tesseract);return;}const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';s.onload=()=>res(window.Tesseract);s.onerror=()=>rej(new Error('Could not load OCR engine. Check your internet connection.'));document.head.appendChild(s);});

const parseReceiptText=text=>{
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  // Amount: prefer a line containing "total", otherwise max found value
  let amount=null;
  const totalLine=lines.find(l=>/\btotal\b/i.test(l));
  const amtRe=/(\d{1,4}[.,]\d{2})/g;
  if(totalLine){const m=totalLine.match(/(\d{1,4}[.,]\d{2})/);if(m)amount=parseFloat(m[1].replace(',','.'));}
  if(!amount){const all=[];let m;while((m=amtRe.exec(text))!==null){const v=parseFloat(m[1].replace(',','.'));if(v>0&&v<10000)all.push(v);}if(all.length)amount=Math.max(...all);}
  // Date
  let date=null;
  const dp=[
    {re:/(\d{4})[/-](\d{2})[/-](\d{2})/,fn:m=>`${m[1]}-${m[2]}-${m[3]}`},
    {re:/(\d{2})[/.-](\d{2})[/.-](\d{4})/,fn:m=>`${m[3]}-${m[2]}-${m[1]}`},
    {re:/(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+(\d{4})/i,fn:m=>{const mn={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};return`${m[3]}-${mn[m[2].toLowerCase().slice(0,3)]}-${m[1].padStart(2,'0')}`;}}
  ];
  for(const{re,fn}of dp){const m=text.match(re);if(m){date=fn(m);break;}}
  // Vendor: first line that's not purely numbers/symbols
  const vendor=lines.find(l=>l.length>3&&!/^[\d\s£$.,*\-=#@()]+$/.test(l))||null;
  return{vendor,amount,date,description:vendor};
};

const handleScanFree=async()=>{
  if(!img?.dataUrl||scanning)return;
  setScanning('free');setScanErr(null);
  try{
    const Tess=await loadTesseract();
    const result=await Tess.recognize(img.dataUrl,'eng');
    const parsed=parseReceiptText(result.data.text);
    if(!parsed.amount&&!parsed.description){setScanErr('Free scan could not read this image. Try better lighting, or use AI Scan if you have an API key.');setScanning('');return;}
    setForm(f=>({...f,
      description:parsed.description||f.description,
      amount:parsed.amount!=null?String(parsed.amount):f.amount,
      date:parsed.date||f.date
    }));
    setScanned(true);
  }catch(e){setScanErr('Free scan failed: '+e.message);}
  setScanning('');
};

const handleScanAI=async()=>{
  if(!img?.dataUrl||scanning)return;
  setScanning('ai');setScanErr(null);
  try{
    const base64=img.dataUrl.split(',')[1];
    const isPdf=img.isPdf;
    const mediaType=isPdf?'application/pdf':(img.dataUrl.match(/data:([^;]+);/)?.[1]||'image/jpeg');
    const catList=EXPENSE_CATS.map(c=>c[0]).join('|');
    const prompt=`You are a receipt scanner. Extract these fields and respond with ONLY a valid JSON object, no other text, no markdown fences:\n{"vendor":"shop name","amount":number,"date":"YYYY-MM-DD","subcategory":"one of: ${catList}","description":"short summary"}\n\nIf any field is unclear, use null. Date must be YYYY-MM-DD. Amount is the total in pounds as a number only. Pick the best matching subcategory.`;
    const content=isPdf
      ?[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]
      :[{type:"image",source:{type:"base64",media_type:mediaType,data:base64}},{type:"text",text:prompt}];
    const res=await fetch(PROXY_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:500,messages:[{role:"user",content}]})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message||'API error');
    const txt=(data.content||[]).map(b=>b.text||'').join('').trim();
    const clean=txt.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    setForm(f=>({...f,
      description:parsed.description||parsed.vendor||f.description,
      amount:parsed.amount!=null?String(parsed.amount):f.amount,
      date:parsed.date||f.date,
      subcategory:parsed.subcategory&&EXPENSE_CATS.find(c=>c[0]===parsed.subcategory)?parsed.subcategory:f.subcategory
    }));
    setScanned(true);
  }catch(e){setScanErr('AI scan failed: '+(e.message||'Unknown error.'));}
  setScanning('');
};

const handleGmailScan=async()=>{
  if(!sheetsUrl)return;
  setMode('gmail');setGmailLoading(true);setGmailPending([]);setGmailErr(null);
  Sheets.init(sheetsUrl);
  const res=await Sheets.scanGmailReceipts();
  setGmailLoading(false);
  if(!res){setGmailErr('Could not reach the script. Check your Sheets URL in Settings.');return;}
  if(res.error){setGmailErr('Script error: '+res.error);return;}
  const found=res.found||[];
  setGmailPending(found);
  const sel={},edits={};
  found.forEach(r=>{
    sel[r.id]=true;
    edits[r.id]={description:r.vendor||r.subject||'Receipt',amount:r.amount!=null?String(r.amount):'',date:r.date||today(),category:'business',subcategory:'other'};
  });
  setGmailSel(sel);setGmailEdits(edits);
  // AI category prediction via proxy
  if(found.length>0){
    found.forEach(async r=>{
      try{
        const res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:20,messages:[{role:'user',content:`Business expense category. Reply ONLY one of: meals|travel|accommodation|equipment|software|training|marketing|office|professional|other

Expense: ${r.vendor||''} ${r.subject||''}`}]})});
        const d=await res.json();
        const cat=(d.content?.[0]?.text||'').trim().toLowerCase().replace(/[^a-z]/g,'');
        const valid=['meals','travel','accommodation','equipment','software','training','marketing','office','professional','other'];
        if(valid.includes(cat))setGmailEdits(p=>({...p,[r.id]:{...(p[r.id]||{}),subcategory:cat}}));
      }catch(e){}
    });
  }
};

const handleGmailImport=()=>{
  const toImport=gmailPending.filter(r=>gmailSel[r.id]);
  const zeroAmt=toImport.filter(r=>{const a=parseFloat((gmailEdits[r.id]||{}).amount);return !a||a<=0;});
  if(zeroAmt.length>0){
    alert('Some selected receipts have no amount. Please enter amounts before importing.');
    return;
  }
  toImport.forEach(r=>{
    const e=gmailEdits[r.id]||{};
    const cat=e.category||'business';
    onAdd({
      date:e.date||today(),description:e.description||'Gmail Receipt',
      amount:parseFloat(e.amount)||0,
      category:cat,subcategory:e.subcategory||'other',
      notes:'Imported from Gmail: '+r.subject,
      driveUrl:r.driveUrl||null,imageData:null,
      gmailUrl:r.gmailUrl||null,
      status:cat==='reimbursable'?'pending':'logged'
    });
  });
  // Label only the imported emails as Processed — not the skipped ones
  if(sheetsUrl&&toImport.length>0){
    Sheets.init(sheetsUrl);
    Sheets.labelProcessed(toImport.map(r=>r.id));
    // Move any Drive files to correct category folder
    toImport.forEach(r=>{
      const e=gmailEdits[r.id]||{};
      const cat=e.category||'business';
      const fileId=(r.driveUrl||'').match(/\/d\/([^\/]+)\//)?.[1]||(r.driveUrl||'').match(/id=([^&]+)/)?.[1];
      if(fileId&&cat==='reimbursable')Sheets.moveToFolder(fileId,'reimbursable');
    });
  }
  const remaining=gmailPending.filter(r=>!gmailSel[r.id]);
  if(remaining.length===0){
    setMode('list');setGmailPending([]);setGmailSel({});setGmailEdits({});
  } else {
    setGmailPending(remaining);
    const newSel={};remaining.forEach(r=>{newSel[r.id]=false;});
    setGmailSel(newSel);
  }
};

};

// ── FIX: combined handler — creates Google Doc then immediately saves record ─
const handleCreateDocAndSave=async()=>{
  if(!hasItems)return;
  let finalDocUrl=docUrl; // reuse if already created
  // Step 1: create Google Doc if connected and not yet created
  if(sheetsUrl&&!docUrl){
    setCreatingDoc(true);setDocErr(null);setDocStatus('');
    Sheets.init(sheetsUrl);
    // upload any receipt images first
    const updatedReimbs=[...selReimbs];
    const needsUpload=updatedReimbs.filter(r=>r.imageData&&!r.driveUrl);
    if(needsUpload.length>0){
      setDocStatus(`Uploading ${needsUpload.length} receipt image${needsUpload.length>1?'s':''}...`);
      for(let i=0;i<updatedReimbs.length;i++){
        const r=updatedReimbs[i];
        if(r.imageData&&!r.driveUrl){
          const driveUrl=await Sheets.uploadReceipt({...r});
          if(driveUrl){updatedReimbs[i]={...r,driveUrl};onUpdateReceipt(r.id,{driveUrl,imageData:null});}
        }
      }
    }
    setDocStatus('Creating Google Doc invoice...');
    const res=await Sheets.createInvoice({invoiceNum:invNum,client:client.name,clientEmail:client.email,clientAddress:client.address,dueDate,notes,grandTotal,incomeTotal,reimbTotal,deductTotal,deductions:deductions.filter(d=>d.description&&parseFloat(d.amount)>0),invoicePeriod,selEntries,selReimbs:updatedReimbs},settings);
    setCreatingDoc(false);setDocStatus('');
    if(res?.url){
      finalDocUrl=res.url;
      setDocUrl(res.url);
    }else{
      setDocErr(res?.err||'Could not create Google Doc. Record not saved — fix connection and try again.');
      return; // abort save if doc failed
    }
  }
  // Step 2: save invoice record (with docUrl baked in directly, not from state)
  const inv={invoiceNum:invNum,date:new Date().toISOString(),client:client.name,clientEmail:client.email,subtotal:grandTotal,incomeTotal,reimbTotal,deductTotal,deductions:deductions.filter(d=>d.description&&parseFloat(d.amount)>0),dueDate,entryIds:selEntries.map(e=>e.id),reimbIds:selReimbs.map(r=>r.id),docUrl:finalDocUrl||null};
  onAddInvoice(inv);
  selReimbs.forEach(r=>onUpdateReceipt(r.id,{status:'invoiced'}));
  if(onUpdateEntry)selEntries.forEach(e=>onUpdateEntry(e.id,{invoiceId:inv.id||inv.invoiceNum}));
  setSettings(s=>({...s,invoiceCounter:(s.invoiceCounter||1)+1}));
  setFlash(true);
  setTimeout(()=>{setFlash(false);setMode('list');setSelE({});setSelR({});setDocUrl(null);setDeductions([]);},1400);
};

// ── REPORTS ──────────────────────────────────────────────────────────────────
function ReportsView({entries,receipts,invoices,settings={}}){
const[xlsxBusy,setXlsxBusy]=useState(false);
const[xlsxErr,setXlsxErr]=useState('');
const[range,setRange]=useState('all');
const[customFrom,setCustomFrom]=useState('');
const[customTo,setCustomTo]=useState('');

// UK tax year runs 6 April to 5 April
const taxYearBounds=(year)=>({from:`${year}-04-06`,to:`${year+1}-04-05`});
const now=new Date();
const currentTaxYearStart=now.getMonth()<3||(now.getMonth()===3&&now.getDate()<6)?now.getFullYear()-1:now.getFullYear();

let from='',to='';
if(range==='thisTax'){const b=taxYearBounds(currentTaxYearStart);from=b.from;to=b.to;}
else if(range==='lastTax'){const b=taxYearBounds(currentTaxYearStart-1);from=b.from;to=b.to;}
else if(range==='thisMonth'){const m=String(now.getMonth()+1).padStart(2,'0');from=`${now.getFullYear()}-${m}-01`;const last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();to=`${now.getFullYear()}-${m}-${String(last).padStart(2,'0')}`;}
else if(range==='custom'){from=customFrom;to=customTo;}

const inRange=d=>{if(!d)return false;if(range==='all')return true;if(!from||!to)return true;return d>=from&&d<=to;};

const activeE=entries.filter(e=>e.status!=='Void'&&inRange(e.date));
const bizExp=receipts.filter(r=>r.category==='business'&&r.status!=='void'&&inRange(r.date));
const pending=receipts.filter(r=>r.category==='reimbursable'&&r.status==='pending'&&inRange(r.date));
const reimbursed=receipts.filter(r=>r.category==='reimbursable'&&r.status==='reimbursed'&&inRange(r.date));
const totG=activeE.reduce((a,e)=>a+(e.subtotal||0),0);
const totBiz=bizExp.reduce((a,r)=>a+(r.amount||0),0);
const taxableP=Math.max(0,totG-totBiz);
const totTax=taxableP*TAX;
const totN=taxableP-totTax;
const totPend=pending.reduce((a,r)=>a+(r.amount||0),0);
const totPaid=reimbursed.reduce((a,r)=>a+(r.amount||0),0);

// Income by client
const byClient={};
activeE.forEach(e=>{const k=e.client||'Unspecified';byClient[k]=(byClient[k]||0)+(e.subtotal||0);});
const clientRows=Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,8);

// Expenses by subcategory
const byCat={};
bizExp.forEach(r=>{const k=r.subcategory||'other';byCat[k]=(byCat[k]||0)+(r.amount||0);});
const catRows=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
const maxCat=catRows[0]?catRows[0][1]:1;

// Monthly P&L
const months={};
activeE.forEach(e=>{const k=(e.date||'').substring(0,7);if(k){months[k]=months[k]||{income:0,expenses:0};months[k].income+=(e.subtotal||0);}});
bizExp.forEach(r=>{const k=(r.date||'').substring(0,7);if(k){months[k]=months[k]||{income:0,expenses:0};months[k].expenses+=(r.amount||0);}});
const monthRows=Object.entries(months).sort().map(([k,v])=>({month:k,income:v.income,expenses:v.expenses,profit:v.income-v.expenses}));
const maxMonth=monthRows.reduce((m,r)=>Math.max(m,r.income,r.expenses),0)||1;

const rangeLabel=()=>{
  if(range==='all')return'All time';
  if(range==='thisTax')return`Tax year ${currentTaxYearStart}/${(currentTaxYearStart+1)%100}`;
  if(range==='lastTax')return`Tax year ${currentTaxYearStart-1}/${currentTaxYearStart%100}`;
  if(range==='thisMonth')return now.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  if(range==='custom'&&from&&to)return`${fmtD(from)} to ${fmtD(to)}`;
  return'';
};

const exportIncome=()=>{const rows=[['ID','Invoice Ref','Date','Client','Description','Type','Start','End','Hours','Rate','Gross','Tax Stash','Take Home','Status']];activeE.forEach(e=>rows.push([e.id||'',e.invoiceRef||'',e.date,e.client||'',e.description||'',e.type,e.startTime||'',e.endTime||'',(e.hours||0).toFixed(2),e.rate||'',(e.subtotal||0).toFixed(2),(e.tax||0).toFixed(2),(e.net||0).toFixed(2),e.status||'Pending']));rows.push([],[' ','','','','','','','','','TOTAL',totG.toFixed(2),(totG*TAX).toFixed(2),(totG-totG*TAX).toFixed(2),'']);dlCSV(rows,`income_${rangeLabel().replace(/\s/g,'_')}_${today()}.csv`);};

const exportExpenses=()=>{const rows=[['ID','Date','Description','Type','Category','Amount','Status','Paid By','Owed By','Drive Link']];const allInRange=receipts.filter(r=>inRange(r.date));allInRange.forEach(r=>rows.push([r.id||'',r.date,r.description||'',r.category,r.subcategory?catLabel(r.subcategory):'',(r.amount||0).toFixed(2),r.status||'pending',r.paidBy||'',r.owedBy||'',r.driveUrl||'']));rows.push([],[' ','Business expenses','','',totBiz.toFixed(2)],[' ','Still owed to you','','',totPend.toFixed(2)],[' ','Reimbursed','','',totPaid.toFixed(2)]);dlCSV(rows,`expenses_${rangeLabel().replace(/\s/g,'_')}_${today()}.csv`);};

const exportBackup=()=>{const KEYS=['mhq-entries','mhq-receipts','mhq-invoices','mhq-clients','mhq-settings','mhq-trash'];const keys={};KEYS.forEach(k=>{try{const v=localStorage.getItem(k);if(v!=null)keys[k]=JSON.parse(v);}catch{}});const blob=new Blob([JSON.stringify({app:'money-tracker-backup',v:1,exportedAt:new Date().toISOString(),keys},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`money-backup-${today()}.json`;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1500);};
const importBackup=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='application/json,.json';inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const j=JSON.parse(r.result);const keys=j.keys||j.data||j;let n=0;Object.keys(keys).forEach(k=>{if(/^mhq-/.test(k)){localStorage.setItem(k,JSON.stringify(keys[k]));n++;}});if(!n){alert('No Float / Honey data found in that file.');return;}alert('Imported '+n+' data set'+(n>1?'s':'')+'. Honey will now reload.');location.reload();}catch(e){alert('That file is not a valid backup.');}};r.readAsText(f);};inp.click();};
const exportTaxYear=()=>{
  const year=range==='lastTax'?currentTaxYearStart-1:currentTaxYearStart;
  const b=taxYearBounds(year);
  const tyEntries=entries.filter(e=>e.status!=='Void'&&e.date>=b.from&&e.date<=b.to);
  const tyExp=receipts.filter(r=>r.category==='business'&&r.status!=='void'&&r.date>=b.from&&r.date<=b.to);
  const ge=tyEntries.reduce((a,e)=>a+(e.subtotal||0),0);
  const be=tyExp.reduce((a,r)=>a+(r.amount||0),0);
  const profit=Math.max(0,ge-be);
  const rows=[
    [`UK Tax Year ${year}/${(year+1)%100} Report`],
    [`Period: ${fmtD(b.from)} to ${fmtD(b.to)}`],
    [],
    ['SUMMARY'],
    ['Gross Income',ge.toFixed(2)],
    ['Allowable Business Expenses',be.toFixed(2)],
    ['Taxable Profit',profit.toFixed(2)],
    ['Estimated Tax Stash (20%)',(profit*0.20).toFixed(2)],
    [],
    ['INCOME'],
    ['Date','Client','Description','Hours','Rate','Gross','Status'],
    ...tyEntries.map(e=>[e.date,e.client||'',e.description||'',(e.hours||0).toFixed(2),e.rate||'',(e.subtotal||0).toFixed(2),e.status||'']),
    [],
    ['EXPENSES BY CATEGORY'],
    ['Category','Total'],
    ...Object.entries(tyExp.reduce((acc,r)=>{const k=catLabel(r.subcategory||'other');acc[k]=(acc[k]||0)+(r.amount||0);return acc;},{})).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[k,v.toFixed(2)]),
    [],
    ['EXPENSES DETAIL'],
    ['Date','Description','Category','Amount'],
    ...tyExp.map(r=>[r.date,r.description||'',catLabel(r.subcategory||'other'),(r.amount||0).toFixed(2)])
  ];
  dlCSV(rows,`tax_year_${year}-${(year+1)%100}.csv`);
};

const exportYearWorkbook=async()=>{
  if(xlsxBusy)return;
  setXlsxErr('');setXlsxBusy(true);
  try{
    const year=range==='lastTax'?currentTaxYearStart-1:currentTaxYearStart;
    const b=taxYearBounds(year);
    const tyEntries=entries.filter(e=>e.status!=='Void'&&e.date>=b.from&&e.date<=b.to).sort((a,x)=>(a.date||'').localeCompare(x.date||''));
    const tyExp=receipts.filter(r=>r.category==='business'&&r.status!=='void'&&r.date>=b.from&&r.date<=b.to).sort((a,x)=>(a.date||'').localeCompare(x.date||''));
    const ge=tyEntries.reduce((a,e)=>a+(e.subtotal||0),0);
    const be=tyExp.reduce((a,r)=>a+(r.amount||0),0);
    const profit=Math.max(0,ge-be);
    const catTotals=Object.entries(tyExp.reduce((acc,r)=>{const k=catLabel(r.subcategory||'other');acc[k]=(acc[k]||0)+(r.amount||0);return acc;},{})).sort((a,x)=>x[1]-a[1]).map(([k,v])=>[k,v]);
    await buildYearWorkbook({
      year,
      period:`${fmtD(b.from)} to ${fmtD(b.to)}`,
      biz:settings.business||settings.name||'Year-End Summary',
      summary:{gross:ge,expenses:be,profit,taxStash:profit*0.20},
      income:tyEntries.map(e=>({date:e.date,client:e.client||'',invoiceRef:e.invoiceRef||'',description:e.description||'',hours:e.hours||0,rate:e.rate||0,gross:e.subtotal||0,status:e.status||'Pending'})),
      expenses:tyExp.map(r=>({date:r.date,description:r.description||'',category:catLabel(r.subcategory||'other'),amount:r.amount||0,link:r.driveUrl||''})),
      catTotals,
    });
  }catch(e){setXlsxErr(e.message||'Could not build the workbook.');}
  finally{setXlsxBusy(false);}
};

//  Paste into Extensions > Apps Script in your Google Sheet.
//  Deploy > New deployment > Web app
//    Execute as: Me  |  Who has access: Anyone

//  Scanned threads are moved to "Tracker/Processed" automatically.
//  Requires Gmail permission — re-authorise after pasting this version.

// ── Menu ──────────────────────────────────────────────────────────
function onOpen() {
  SpreadsheetApp.getUi().createMenu('Honey')
    .addItem('\\u21ba Pull deletions from sheet \\u2192 app', 'syncFromSheetManual')
    .addSeparator()
    .addItem('\\u2699 Install auto-sync trigger', 'installTriggers')
    .addToUi();
}

function installTriggers() {
  var triggers = ScriptApp.getProjectTriggers();
  for (var i = 0; i < triggers.length; i++) {
    if (triggers[i].getHandlerFunction() === 'onChangeHandler') {
      ScriptApp.deleteTrigger(triggers[i]);
    }
  }
  ScriptApp.newTrigger('onChangeHandler')
    .forSpreadsheet(SpreadsheetApp.getActive())
    .onChange()
    .create();
  SpreadsheetApp.getUi().alert(
    'Auto-sync installed!\\n\\n' +
    'Deleting rows from Income, Expenses, or Invoices sheets will now ' +
    'automatically remove those records from your app data.\\n\\n' +
    'The app reflects changes on next load, or click Sync in Settings.'
  );
}

function onChangeHandler(e) {
  if (e.changeType !== 'REMOVE_ROW') return;
  try { syncFromSheet(e.source); } catch(err) {
    Logger.log('onChangeHandler error: ' + err.toString());
  }
}

function syncFromSheetManual() {
  try {
    syncFromSheet(SpreadsheetApp.getActiveSpreadsheet());
    SpreadsheetApp.getUi().alert('Sync complete. Open the app and click Sync in Settings to pull the changes.');
  } catch(err) {
    SpreadsheetApp.getUi().alert('Error: ' + err.toString());
  }
}

function syncFromSheet(ss) {
  var data = load(ss);
  var entries  = data.entries  || [];
  var receipts = data.receipts || [];
  var invoices = data.invoices || [];
  var changed  = false;

  var incSh = ss.getSheetByName('Income');
  if (incSh && incSh.getLastRow() >= 7 && incSh.getRange(7,1).getValue() === 'ID') {
    var incLast = incSh.getLastRow();
    if (incLast > 7) {
      var incIds = {};
      incSh.getRange(8,1,incLast-7,1).getValues().forEach(function(r){ if(r[0]) incIds[r[0]]=true; });
      var ef = entries.filter(function(e){ return incIds[e.id]; });
      if (ef.length !== entries.length) { entries = ef; changed = true; }
    } else if (entries.length > 0) { entries = []; changed = true; }
  }

  var bizReceiptIds = null, rmbReceiptIds = null;
  var bizExpSh = ss.getSheetByName('Business Expenses');
  if (bizExpSh && bizExpSh.getLastRow() >= 4 && String(bizExpSh.getRange(4,1).getValue()) === 'ID') {
    bizReceiptIds = {};
    if (bizExpSh.getLastRow() > 4) {
      bizExpSh.getRange(5,1,bizExpSh.getLastRow()-4,1).getValues().forEach(function(r){ if(r[0]) bizReceiptIds[r[0]]=true; });
    }
  }
  var rmbExpSh = ss.getSheetByName('Reimbursable Expenses');
  if (rmbExpSh && rmbExpSh.getLastRow() >= 4 && String(rmbExpSh.getRange(4,1).getValue()) === 'ID') {
    rmbReceiptIds = {};
    if (rmbExpSh.getLastRow() > 4) {
      rmbExpSh.getRange(5,1,rmbExpSh.getLastRow()-4,1).getValues().forEach(function(r){ if(r[0]) rmbReceiptIds[r[0]]=true; });
    }
  }
  if (bizReceiptIds !== null || rmbReceiptIds !== null) {
    var rf = receipts.filter(function(r) {
      if (r.category === 'business' && bizReceiptIds !== null) return !!bizReceiptIds[r.id];
      if (r.category === 'reimbursable' && rmbReceiptIds !== null) return !!rmbReceiptIds[r.id];
      return true;
    });
    if (rf.length !== receipts.length) { receipts = rf; changed = true; }
  }

  var invSh = ss.getSheetByName('Invoices');
  if (invSh && invSh.getLastRow() >= 3 && invSh.getRange(3,1).getValue() === 'ID') {
    var invLast = invSh.getLastRow();
    if (invLast > 3) {
      var invIds = {};
      invSh.getRange(4,1,invLast-3,1).getValues().forEach(function(r){ if(r[0]) invIds[r[0]]=true; });
      var iif = invoices.filter(function(i){ return invIds[i.id]; });
      if (iif.length !== invoices.length) { invoices = iif; changed = true; }
    } else if (invoices.length > 0) { invoices = []; changed = true; }
  }

  if (!changed) return;
  data.entries = entries; data.receipts = receipts; data.invoices = invoices;
  var store = ss.getSheetByName('_app_data') || ss.insertSheet('_app_data');
  store.getRange('A1').setValue(JSON.stringify(data));
  buildIncomeSheet(ss, entries, data.settings || {});
  buildExpensesSheet(ss, receipts);
  buildInvoicesSheet(ss, invoices);
}

function doGet(e) {
  var result;
  try {
    var action = e.parameter.action;
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    if (action === 'load') {
      result = load(ss);
    } else if (action === 'createInvoice') {
      var payload = JSON.parse(e.parameter.data || '{}');
      var url = createInvoiceDoc(payload.invoice || {}, payload.settings || {});
      result = { ok: true, url: url };
    } else if (action === 'scanReceipts') {
      result = scanReceipts();
    } else if (action === 'scanFolders') {
      result = scanFolders(e.parameter.seen||'');
    } else if (action === 'labelProcessed') {
      var ids = (e.parameter.ids || '').split(',').filter(function(x){return x;});
      result = labelProcessed(ids);
    } else if (action === 'deleteReceiptFiles') {
      result = deleteReceiptFiles(e.parameter.threadId||'', e.parameter.driveFileId||'');
    } else if (action === 'moveToFolder') {
      result = moveToFolder(e.parameter.fileId||'', e.parameter.category||'business');

    } else if (action === 'sendInvoice') {
      var to = e.parameter.to || '';
      var subj = e.parameter.subject || '';
      var msgBody = e.parameter.body || '';
      var docUrl = e.parameter.docUrl || '';
      if (!to) { result = { ok: false, error: 'No recipient' }; }
      else {
        var htmlBody = msgBody.replace(/\\n/g, '<br>');
        if (docUrl) htmlBody += '<br><br><a href="' + docUrl + '" style="color:#c8941a;font-weight:bold">View Invoice &#8594;</a>';
        MailApp.sendEmail({ to: to, subject: subj, body: msgBody, htmlBody: htmlBody });
        result = { ok: true };
      }

    } else {
      result = { error: 'unknown action' };
    }
  } catch(err) { result = { error: err.toString() }; }
  var cb = e.parameter.callback;
  if (cb) {
    return ContentService.createTextOutput(cb+'('+JSON.stringify(result)+')')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }
  return ContentService.createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    if (data.action === 'uploadReceipt') {
      var driveUrl = uploadReceiptImage(data.receipt);
      return respond({ ok: true, driveUrl: driveUrl });
    }
    setupFolders(ss);
    save(ss, data);
    return respond({ ok: true });
  } catch(err) { return respond({ error: err.toString() }); }
}

function load(ss) {
  var sh = ss.getSheetByName('_app_data');
  if (!sh) return { entries:[], receipts:[], invoices:[], settings:{} };
  var val = sh.getRange('A1').getValue();
  try { return val ? JSON.parse(val) : {}; } catch(e) { return {}; }
}

function save(ss, data) {
  var receipts = (data.receipts||[]).map(function(r){
    var c={}; for(var k in r) c[k]=r[k];
    if(c.imageData && !c.driveUrl){
      try{var u=uploadReceiptImage(c);if(u)c.driveUrl=u;}catch(e){Logger.log('img upload err:'+e);}
    }
    delete c.imageData;
    return c;
  });
  var store = ss.getSheetByName('_app_data') || ss.insertSheet('_app_data');
  store.getRange('A1').setValue(JSON.stringify({
    entries:data.entries||[], receipts:receipts,
    invoices:data.invoices||[], settings:data.settings||{}, clients:data.clients||[]
  }));
  try { store.hideSheet(); } catch(e) {}
  buildIncomeSheet(ss, data.entries||[], data.settings||{});
  buildExpensesSheet(ss, receipts);
  buildInvoicesSheet(ss, data.invoices||[]);
}

function getMasterFolder(){ return getOrCreateFolder('Honey'); }
function getInvoiceFolder(){ return getSubFolder(getMasterFolder(),'Invoices'); }
function getBusinessReceiptFolder(){ return getSubFolder(getMasterFolder(),'Business Expenses'); }
function getReimbursableReceiptFolder(){ return getSubFolder(getMasterFolder(),'Reimbursable Expenses'); }
function extractDriveId(url){var s=String(url||'');var m=s.match(/[/]d[/]([^/?]+)/);if(m)return m[1];m=s.match(/[?&]id=([^&]+)/);if(m)return m[1];return '';}
function scanFolders(seenCsv){
  var ss=SpreadsheetApp.getActiveSpreadsheet();
  var data=load(ss);
  var logged={};
  String(seenCsv||'').split(',').forEach(function(x){if(x)logged[x]=true;});
  (data.receipts||[]).forEach(function(r){var id=extractDriveId(r.driveUrl);if(id)logged[id]=true;});
  (data.invoices||[]).forEach(function(i){var id=extractDriveId(i.docUrl);if(id)logged[id]=true;});
  var out=[];
  var groups=[['business',getBusinessReceiptFolder()],['reimbursable',getReimbursableReceiptFolder()],['invoice',getInvoiceFolder()]];
  for(var g=0;g<groups.length;g++){
    var cat=groups[g][0], folder=groups[g][1];
    var it=folder.getFiles();
    while(it.hasNext()){
      if(out.length>=12) break;
      var f=it.next();
      var mt=f.getMimeType();
      if(mt.indexOf('image/')!==0 && mt!=='application/pdf') continue;
      var id=f.getId();
      if(logged[id]) continue;
      var b64=Utilities.base64Encode(f.getBlob().getBytes());
      out.push({fileId:id,name:f.getName(),folder:cat,mimeType:mt,driveUrl:'https://drive.google.com/file/d/'+id+'/view',imageData:'data:'+mt+';base64,'+b64});
    }
  }
  return {files:out};
}
function getOrCreateFolder(name){ var it=DriveApp.getFoldersByName(name); return it.hasNext()?it.next():DriveApp.createFolder(name); }
function getSubFolder(parent,name){ var it=parent.getFoldersByName(name); return it.hasNext()?it.next():parent.createFolder(name); }
function setupFolders(ss){
  var props=PropertiesService.getScriptProperties();
  if(props.getProperty('mhq_folders_v1')==='1')return;
  try{
    var master=getMasterFolder();
    getSubFolder(master,'Invoices');getSubFolder(master,'Business Expenses');getSubFolder(master,'Reimbursable Expenses');getSubFolder(master,'Gmail Receipts');
    var ssFile=DriveApp.getFileById(ss.getId());var parents=ssFile.getParents();var inM=false;
    while(parents.hasNext()){if(parents.next().getId()===master.getId()){inM=true;break;}}
    if(!inM){master.addFile(ssFile);try{DriveApp.getRootFolder().removeFile(ssFile);}catch(e2){}}
    props.setProperty('mhq_folders_v1','1');
  }catch(e){}
}

function buildIncomeSheet(ss, entries, settings) {
  var sh = ss.getSheetByName('Income') || ss.insertSheet('Income');
  sh.clearContents(); sh.clearFormats(); sh.clearConditionalFormatRules();
  var totG=entries.reduce(function(a,e){return a+(e.subtotal||0);},0);
  var totT=totG*0.20, totN=totG-totT;
  sh.getRange('A1:N1').merge().setValue('HONEY — INCOME')
    .setFontWeight('bold').setFontSize(16).setBackground('#eceadf').setFontColor('#c8941a').setHorizontalAlignment('center');
  sh.getRange('B2').setValue('Tax rate:').setFontColor('#1a1a1a');
  sh.getRange('C2').setValue(0.20).setNumberFormat('0%').setFontColor('#1a1a1a');
  sh.getRange('D2').setValue('\\u2190 change if needed').setFontColor('#888888').setFontStyle('italic');
  [['B',totG,'#c8941a','TOTAL GROSS'],['F',totT,'#c05048','SET ASIDE'],['J',totN,'#3aaa82','TAKE HOME']].forEach(function(p){
    sh.getRange(p[0]+'4').setValue(p[3]).setFontWeight('bold').setFontSize(9).setBackground('#ffffff').setFontColor('#7a7090');
    sh.getRange(p[0]+'5').setValue(p[1]).setNumberFormat('"\\u00a3"#,##0.00').setFontSize(18).setFontWeight('bold').setBackground('#ffffff').setFontColor(p[2]);
  });
  var headers=['ID','Invoice Ref','Date','Client / Description','Start','End','Hours','Rate \\u00a3/hr','Lump Sum \\u00a3','Dec. Hrs','Gross','Tax Stash','Take Home','Status'];
  sh.getRange(7,1,1,headers.length).setValues([headers]).setFontWeight('bold').setBackground('#eceadf').setFontColor('#1a1a1a').setFontSize(10);
  sh.setFrozenRows(7);
  if(entries.length>0){
    var rows=entries.map(function(e){return[e.id||'',e.invoiceRef||(settings.payRef||''),e.date||'',(e.client||'')+(e.client&&e.description?'\\u2014 ':''+(e.description||''))||'',e.startTime||'',e.endTime||'',e.type==='manual'?(e.hours||''):(e.hours||0),e.type!=='lump'?(e.rate||''):'',e.type==='lump'?(e.subtotal||0):'',e.hours||0,e.subtotal||0,e.tax||0,e.net||0,e.status||'Pending'];});
    sh.getRange(8,1,rows.length,headers.length).setValues(rows).setFontColor('#1a1a1a').setFontSize(10);
    sh.getRange(8,8,rows.length,1).setNumberFormat('"\\u00a3"#,##0.00');
    sh.getRange(8,9,rows.length,1).setNumberFormat('"\\u00a3"#,##0.00');
    sh.getRange(8,10,rows.length,1).setNumberFormat('0.00');
    sh.getRange(8,11,rows.length,1).setNumberFormat('"\\u00a3"#,##0.00');
    sh.getRange(8,12,rows.length,1).setNumberFormat('"\\u00a3"#,##0.00');
    sh.getRange(8,13,rows.length,1).setNumberFormat('"\\u00a3"#,##0.00');

function buildSingleExpenseSheet(ss, receipts, sheetName, color, title) {

  var tot=receipts.filter(function(r){return r.status!=='void';}).reduce(function(a,r){return a+(r.amount||0);},0);
  sh.getRange('B2').setValue('Total (excl. voided):').setFontColor('#888888').setFontSize(10);
  sh.getRange('D2').setValue(tot).setNumberFormat('"\u00a3"#,##0.00').setFontColor(color).setFontSize(12).setFontWeight('bold');
  var headers=['ID','Date','Description','Category','Amount','Status','Paid By','Owed By','Notes','Drive/Email Link'];

  sh.setFrozenRows(4);

      if(r.driveUrl){sh.getRange(5+i,10).setFormula('=HYPERLINK("'+r.driveUrl+'","View Receipt")').setFontColor('#5876bc').setFontSize(10).setBackground(bg);}
      else if(r.gmailUrl){sh.getRange(5+i,10).setFormula('=HYPERLINK("'+r.gmailUrl+'","Open Email")').setFontColor('#6a9fb5').setFontSize(10).setBackground(bg);}
      else{sh.getRange(5+i,10).setValue('').setFontSize(10).setBackground(bg);}

  try{sh.hideColumns(1);}catch(e){}

function uploadReceiptImage(receipt) {
  var folder=receipt.category==='reimbursable'?getReimbursableReceiptFolder():getBusinessReceiptFolder();
  var rawData=(receipt.imageData||'');
  var mimeMatch=rawData.match(/^data:([^;]+);base64,/);
  var mimeType=mimeMatch?mimeMatch[1]:'image/jpeg';
  var b64=rawData.replace(/^data:[^;]+;base64,/,'');
  if(!b64)return null;
  var ext=mimeType==='application/pdf'?'pdf':'jpg';
  var fname=(receipt.description||'Receipt').replace(/[^a-zA-Z0-9 _-]/g,'')+'_'+(receipt.date||today())+'.'+ext;
  var blob=Utilities.newBlob(Utilities.base64Decode(b64),mimeType,fname);
  // Dedup: if an identical file (same name AND same byte size) already exists in this folder, reuse it
  // instead of creating a duplicate. Stops the "(1)", "(2)" pile-up of receipt images on repeated syncs.
  var newSize=blob.getBytes().length;
  var existing=folder.getFilesByName(fname);
  while(existing.hasNext()){var ex=existing.next();try{if(ex.getSize()===newSize)return ex.getUrl();}catch(e){}}
  var file=folder.createFile(blob);
  file.setSharing(DriveApp.Access.ANYONE_WITH_LINK,DriveApp.Permission.VIEW);
  return file.getUrl();
}

function scanReceipts() {
  var inboxLabel = GmailApp.getUserLabelByName('Tracker/Receipts');
  if (!inboxLabel) return { found: [] };
  var processedLabel = GmailApp.getUserLabelByName('Tracker/Processed');
  if (!processedLabel) processedLabel = GmailApp.createLabel('Tracker/Processed');
  var bizFolder = getBusinessReceiptFolder();
  var rmbFolder = getReimbursableReceiptFolder();
  var threads = inboxLabel.getThreads(0, 20);
  var found = [];
  for (var ti = 0; ti < threads.length; ti++) {
    var thread = threads[ti];
    var messages = thread.getMessages();
    for (var mi = 0; mi < messages.length; mi++) {
      var msg = messages[mi];
      try {
        var body = msg.getPlainBody();
        var subject = msg.getSubject();
        var fromRaw = msg.getFrom();
        var msgDate = msg.getDate();
        // Extract amount
        var amount = null;
        var combined = body.substring(0, 3000) + ' ' + subject;
        var patterns = [
          /[£$€][\\s]*(\\d+(?:\\.\\d{1,2})?)/,
          /total[^\\d]{0,30}(\\d+\\.\\d{2})/i,
          /amount[^\\d]{0,20}(\\d+\\.\\d{2})/i,
          /(\\d+\\.\\d{2})[\\s]*[£$€]/
        ];
        for (var pi = 0; pi < patterns.length && amount === null; pi++) {
          var m = combined.match(patterns[pi]);
          if (m) amount = parseFloat(m[1]);
        }
        // Extract vendor from From field
        var vendorMatch = fromRaw.match(/^[\\s"]*([^"<]+?)[\\s"]*(?:<|$)/);
        var vendor = vendorMatch ? vendorMatch[1].trim() : fromRaw.replace(/<[^>]+>/,'').trim();
        var dateStr = Utilities.formatDate(msgDate, Session.getScriptTimeZone(), 'yyyy-MM-dd');
        // Handle first valid attachment
        var driveUrl = null;
        var attachments = msg.getAttachments();
        for (var ai = 0; ai < attachments.length && !driveUrl; ai++) {
          var att = attachments[ai];
          var ct = att.getContentType();
          if (ct.indexOf('image/') === 0 || ct === 'application/pdf') {
            var fname = att.getName() || ('receipt_' + dateStr + (ct === 'application/pdf' ? '.pdf' : '.jpg'));
            var attBlob = att.copyBlob().setName(fname);
            var attSize = attBlob.getBytes().length;
            // Dedup: reuse an existing identical attachment (same name AND size) instead of re-saving it
            var newFile = null, exG = bizFolder.getFilesByName(fname);
            while (exG.hasNext()) { var eg = exG.next(); try { if (eg.getSize() === attSize) { newFile = eg; break; } } catch(e) {} }
            if (!newFile) { newFile = bizFolder.createFile(attBlob); newFile.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW); }
            driveUrl = newFile.getUrl();
          }
        }
        found.push({ id: msg.getId(), threadId: thread.getId(), gmailUrl: 'https://mail.google.com/mail/#all/'+thread.getId(), subject: subject, vendor: vendor, date: dateStr, amount: amount, driveUrl: driveUrl });
      } catch(err) { Logger.log('scanReceipts msg error: ' + err); }
    }
    // Do NOT label as Processed here — labelling happens only after confirmed import via labelProcessed action
  }
  return { found: found };
}

function labelProcessed(ids) {
  var inboxLabel = GmailApp.getUserLabelByName('Tracker/Receipts');
  var processedLabel = GmailApp.getUserLabelByName('Tracker/Processed');
  if (!processedLabel) processedLabel = GmailApp.createLabel('Tracker/Processed');
  var labelled = 0;
  for (var i = 0; i < ids.length; i++) {
    try {
      var msg = GmailApp.getMessageById(ids[i]);
      if (msg) {
        var thread = msg.getThread();
        if (inboxLabel) try { thread.removeLabel(inboxLabel); } catch(e2) {}
        thread.addLabel(processedLabel);
        labelled++;
      }
    } catch(err) { Logger.log('labelProcessed error for id ' + ids[i] + ': ' + err); }
  }
  return { ok: true, labelled: labelled };
}


function moveToFolder(fileId, category) {
  if(!fileId) return {ok:false};
  try{
    var file=DriveApp.getFileById(fileId);
    var targetFolder=category==='reimbursable'?getReimbursableReceiptFolder():getBusinessReceiptFolder();
    var bizFolder=getBusinessReceiptFolder();
    var rmbFolder=getReimbursableReceiptFolder();
    var gmailStaging=getSubFolder(getMasterFolder(),'Gmail Receipts');
    // Remove from other folders, add to target
    [bizFolder,rmbFolder,gmailStaging].forEach(function(f){try{f.removeFile(file);}catch(e){}});
    targetFolder.addFile(file);
    return {ok:true};
  }catch(e){return {ok:false,error:e.toString()};}
}

function deleteReceiptFiles(threadId, driveFileId) {
  var restored = 0, deleted = 0;
  try {
    if (threadId) {
      var thread = GmailApp.getThreadById(threadId);
      if (thread) {
        var processedLabel = GmailApp.getUserLabelByName('Tracker/Processed');
        var inboxLabel = GmailApp.getUserLabelByName('Tracker/Receipts');
        if (!inboxLabel) inboxLabel = GmailApp.createLabel('Tracker/Receipts');
        if (processedLabel) try { thread.removeLabel(processedLabel); } catch(e2) {}
        try { thread.addLabel(inboxLabel); restored = 1; } catch(e3) {}
      }
    }
  } catch(e) { Logger.log('deleteReceiptFiles label error: ' + e); }
  try {
    if (driveFileId) {
      DriveApp.getFileById(driveFileId).setTrashed(true);
      deleted = 1;
    }
  } catch(e) { Logger.log('deleteReceiptFiles drive error: ' + e); }
  return { ok: true, restored: restored, deleted: deleted };
}

function createInvoiceDoc(inv, settings) {

  ].filter(Boolean);

  fp.setAlignment(DocumentApp.HorizontalAlignment.RIGHT);
  for(var mi=1;mi<meta.length;mi++){
    var mp=hR.appendParagraph(meta[mi].t);

    mp.setAlignment(DocumentApp.HorizontalAlignment.RIGHT);

  body.appendParagraph('');body.appendHorizontalRule();body.appendParagraph('');
  var pTbl=body.appendTable([['','']]);
  pTbl.setBorderWidth(0);
  var fC=pTbl.getRow(0).getCell(0);
  var tC=pTbl.getRow(0).getCell(1);
  sp(fC.getChild(0).asParagraph(),'From',8,C.label,true,false);
  sp(fC.appendParagraph(settings.name||'Your Name'),null,13,C.dark,true,false);
  if(settings.business)sp(fC.appendParagraph(settings.business),null,10,C.mid,false,false);
  if(settings.email)sp(fC.appendParagraph(settings.email),null,10,C.mid,false,false);
  sp(tC.getChild(0).asParagraph(),'Bill To',8,C.label,true,false);
  sp(tC.appendParagraph(inv.client||'Client'),null,13,C.dark,true,false);
  if(inv.clientEmail)sp(tC.appendParagraph(inv.clientEmail),null,10,C.mid,false,false);
  if(inv.clientAddress)sp(tC.appendParagraph(inv.clientAddress),null,10,C.mid,false,false);
  body.appendParagraph('');body.appendHorizontalRule();body.appendParagraph('');
  var entries=inv.entries||[], reimbs=inv.reimbs||[];
  var both=entries.length>0&&reimbs.length>0;
  var tData=[['Date','Description','Amount']],rowT=['header'];
  if(both&&entries.length>0){tData.push(['','Services','']);rowT.push('section');}
  entries.forEach(function(e){
    var d=e.date?fmtDate(new Date(e.date+'T12:00:00')):'';
    var desc=(e.client||'')+(e.client&&e.description?' \\u2014 ':'')+( e.description||'');
    tData.push([d,desc,fmtGBP(e.subtotal)]);rowT.push('item');
  });
  if(both&&entries.length>0){tData.push(['','Services total',fmtGBP(inv.incomeTotal||0)]);rowT.push('subtotal');}
  if(reimbs.length>0){
    if(both){tData.push(['','Reimbursable Expenses','']);rowT.push('section');}
    reimbs.forEach(function(r){
      var d=r.date?fmtDate(new Date(r.date+'T12:00:00')):'';
      tData.push([d,r.description||'',fmtGBP(r.amount)]);rowT.push('item');
    });

  }
  var itemTbl=body.appendTable(tData);
  itemTbl.setBorderWidth(0);
  for(var ri=0;ri<itemTbl.getNumRows();ri++){
    var row=itemTbl.getRow(ri),rt=rowT[ri];
    for(var ci=0;ci<3;ci++){
      var cell=row.getCell(ci),p=cell.getChild(0).asParagraph();
      if(rt==='header')     sp(p,null,9,C.label,true,false);
      else if(rt==='section')sp(p,null,8,C.muted,true,false);
      else if(rt==='subtotal'){sp(p,null,10,C.soft,false,true);try{cell.setBackgroundColor('#f7f7f7');}catch(e2){}}
      else                   sp(p,null,11,ci===0?C.muted:C.mid,false,false);
      if(ci===2)p.setAlignment(DocumentApp.HorizontalAlignment.RIGHT);
    }
  }
  body.appendParagraph('');body.appendHorizontalRule();body.appendParagraph('');
  var tLP=body.appendParagraph('Total Due');
  sp(tLP,null,10,C.soft,false,false);
  tLP.setAlignment(DocumentApp.HorizontalAlignment.RIGHT);
  var tAP=body.appendParagraph(fmtGBP(inv.grandTotal||0));
  sp(tAP,null,28,C.accent,true,false);
  tAP.setAlignment(DocumentApp.HorizontalAlignment.RIGHT);
  body.appendParagraph('');body.appendHorizontalRule();body.appendParagraph('');
  if(inv.notes){
    inv.notes.split('\\n').forEach(function(line){
      if(line.trim())sp(body.appendParagraph(line),null,10,C.soft,false,false);
    });
    body.appendParagraph('');
  }
  sp(body.appendParagraph('Late payments are subject to a statutory interest charge of 8% per annum above the Bank of England base rate, in accordance with the Late Payment of Commercial Debts (Interest) Act 1998.'),null,8,C.label,false,true);
  var withImg=reimbs.filter(function(r){return r.driveUrl;});
  if(withImg.length>0){
    body.appendParagraph('');body.appendHorizontalRule();body.appendParagraph('');
    sp(body.appendParagraph('Receipt Images'),null,9,C.label,true,false);
    withImg.forEach(function(r){
      body.appendParagraph('');
      sp(body.appendParagraph(r.description||'Receipt'),null,11,C.mid,true,false);
      try{
        var fId=null;
        var m1=r.driveUrl.match(/\\/d\\/([a-zA-Z0-9_-]+)/);
        var m2=r.driveUrl.match(/id=([a-zA-Z0-9_-]+)/);
        if(m1)fId=m1[1];else if(m2)fId=m2[1];
        if(fId){var blob=DriveApp.getFileById(fId).getBlob();var img=body.appendImage(blob);var mW=400,w=img.getWidth();if(w>mW){var ratio=mW/w;img.setWidth(mW).setHeight(Math.round(img.getHeight()*ratio));}}
        else sp(body.appendParagraph('View: '+r.driveUrl),null,9,'#5876bc',false,false);
      }catch(e2){sp(body.appendParagraph('View: '+r.driveUrl),null,9,'#5876bc',false,false);}
    });
  }
  doc.saveAndClose();
  return doc.getUrl();
}

function sp(para, text, size, color, bold, italic) {
  if(text!==null&&text!==undefined)para.setText(text);
  var a={};
  if(size!==null&&size!==undefined)  a[DocumentApp.Attribute.FONT_SIZE]=size;
  if(color!==null&&color!==undefined)a[DocumentApp.Attribute.FOREGROUND_COLOR]=color;
  if(bold!==null&&bold!==undefined)  a[DocumentApp.Attribute.BOLD]=bold;
  if(italic!==null&&italic!==undefined)a[DocumentApp.Attribute.ITALIC]=italic;
  if(Object.keys(a).length>0)para.setAttributes(a);
  return para;
}
function fmtGBP(n){return '\\u00a3'+Math.max(0,n||0).toFixed(2).replace(/\\B(?=(\\d{3})+(?!\\d))/g,',');}
function fmtDate(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function today(){return new Date().toISOString().split('T')[0];}
function respond(data){return ContentService.createTextOutput(JSON.stringify(data)).setMimeType(ContentService.MimeType.JSON);}

  </Tip>
  <Tip head="Mileage is gold">
    Claim 45p per mile for the first 10,000 business miles, 25p after. This is usually way more than the actual fuel cost because it covers wear and tear. Track every business journey. There are apps that auto-track using GPS.
  </Tip>
  <Tip head="Pre-trading expenses">
    Costs you incurred up to 7 years before officially starting your business count as allowable expenses on day one. Domain renewals, training, equipment, even research trips. Dig out those old receipts.
  </Tip>
  <Tip head="Equipment and the AIA">
    Annual Investment Allowance lets you write off up to £1 million of qualifying equipment in the year you buy it. For freelancers this means a new laptop, camera, or treatment table comes off your tax bill in year one rather than being depreciated.
  </Tip>
</Section>

<Section id="pension" icon="paid" color={T.lumpGreen} title="Pensions: the best tax shelter">
  <Tip>
    Pension contributions reduce your taxable income directly. Pay £1,000 into a SIPP and the government adds £250 (basic rate). Higher rate taxpayers reclaim another £250 via self-assessment.
  </Tip>
  <Tip head="Use your annual allowance">
    Up to £60,000 per year (or 100% of earnings, whichever is lower) goes in tax-relieved. Unused allowance from the past three years can be carried forward.
  </Tip>
  <Tip head="The freelance pension trick">
    Made unexpectedly more this year and pushed into the higher rate band? A pension contribution can pull you back below £50,270 and save 40% tax instead of 20%, plus any high income child benefit charge if applicable.
  </Tip>
</Section>

<Section id="quirky" icon="bulb" color={T.accentBright} title="Quirky and lesser-known">
  <Tip head="Sunglasses, stage makeup, costumes">
    Performers and presenters have successfully claimed sunglasses, makeup, and stage clothing as allowable when used wholly for performance. Ordinary clothes that "could be worn elsewhere" do not count, even if you bought them for a job.
  </Tip>
  <Tip head="The working dog">
    Yes, really. Guard dogs at business premises can be a legitimate expense, including food and vet bills (proportionally). HMRC has approved this for security work and farms.
  </Tip>
  <Tip head="Marriage allowance">
    If your spouse or civil partner earns under £12,570 they can transfer £1,260 of personal allowance to you. Worth £252 a year. Backdate up to four years if you missed it.
  </Tip>
  <Tip head="Trade journals and reference books">
    Buying books, magazines, or journals relevant to your trade is allowable. So is the audiobook subscription, if it's genuinely for professional development.
  </Tip>
  <Tip head="Eye tests and glasses">
    If you spend significant time on a screen for work, eye tests are allowable. Glasses are trickier: they need to be specifically for screen use, not general daily wear.
  </Tip>
  <Tip head="The £1,000 trading allowance">
    If you earn under £1,000 a year from self-employment, you don't need to register or pay tax. Useful for side hustles in their first year.
  </Tip>
  <Tip head="Subscriptions that count">
    HMRC publishes "List 3" of approved professional bodies whose membership fees are deductible. Worth checking if your industry body is on it.
  </Tip>
</Section>

<Section id="getmost" icon="chart" color={T.timed} title="Get the most out of freelancing">
  <Tip head="Charge your true rate">
    Calculate it: target salary, divided by realistic billable hours per year (around 1,000 to 1,200, not 2,000), divided by the proportion of clients who pay on time. Then add 30% for tax, NI, and pension. People underprice because they think in employee terms.
  </Tip>
  <Tip head="Get paid faster">
    Shorter payment terms (14 days, not 30). Late payment fees baked into your contract (you have a statutory right to 8% above base rate plus a fixed charge under the Late Payment of Commercial Debts Act 1998). A polite first reminder on day one of overdue, firmer on day seven.
  </Tip>
  <Tip head="Separate accounts save sanity">
    A free business current account, even informally, makes year-end ten times easier. Every business cost goes from there, every payment into there. Transfer your "salary" to your personal account monthly.
  </Tip>
  <Tip head="The three-pot system">
    Money lands in your business account. Immediately split: roughly 20% to a tax savings account, 10 to 20% to pension, the rest to personal. By January self-assessment time, the bill is already covered.
  </Tip>
  <Tip head="Track time even on lump sum work">
    Knowing how long projects actually take is the difference between profitable freelancing and busy poverty. Use it to refine quotes for next time.
  </Tip>
  <Tip head="Have a quiet month plan">
    Most freelancers have at least one slow month a year. Plan for it: a buffer of 1 to 3 months expenses, or a list of pre-approved tasks you can always do (admin, marketing, learning) so empty diary days don't become anxiety days.
  </Tip>
  <Tip head="Don't forget payments on account">
    If your tax bill was over £1,000 last year, HMRC asks for half of next year's expected tax in January, and the other half in July. First-time freelancers get blindsided by this. Stash accordingly.
  </Tip>
  <Tip head="Make the most of the admin">
    Doing your books monthly, not annually, is the single highest-leverage habit. It catches missing receipts when you can still find them, lets you see how the business is actually doing, and turns a yearly nightmare into ten minutes a month.
  </Tip>
</Section>

<Section id="warnings" icon="warn" color={T.danger} title="Watch out for these">
  <Tip head="Training for new skills">
    Training to maintain or update existing skills is allowable. Training for a brand new trade is not. The line is fuzzy and HMRC has won several cases on this.
  </Tip>
  <Tip head="Client entertainment">
    Entertaining clients is generally not deductible (unlike staff entertainment). A coffee meeting is fine. Taking a client out for dinner is not allowable, even if it's purely for business.
  </Tip>
  <Tip head="Cash businesses and the basis period">
    The "cash basis" (record income when received, not invoiced) is simpler but caps loss relief and excludes some interest. Worth checking which is better for your situation.
  </Tip>
  <Tip head="VAT threshold">
    Currently £90,000 turnover. You can voluntarily register below that, sometimes worth it if you mainly invoice VAT-registered businesses. But it adds admin.
  </Tip>
</Section>

<div style={{fontSize:10,color:T.textFaint,fontStyle:'italic',textAlign:'center',marginTop:20,padding:'0 10px',lineHeight:1.6}}>None of this is professional tax advice. Tax rules change yearly. For anything significant, talk to a qualified accountant. They usually pay for themselves.</div>
</Page>);}

// Reads the old Freelance Tracker's data (ft-* localStorage keys) READ-ONLY.
// Never writes to the old app's storage — it stays intact as your archive.
function ImportCard({onImportOld}){
const[old,setOld]=useState(null);
const[allTime,setAllTime]=useState(false);
const[pasteOpen,setPasteOpen]=useState(false);
const[pasteVal,setPasteVal]=useState('');
const[pasteErr,setPasteErr]=useState(null);
const[result,setResult]=useState(null);
const[confirming,setConfirming]=useState(false);
useEffect(()=>{
  const d={entries:LS.get('ft-entries')||[],receipts:LS.get('ft-receipts')||[],invoices:LS.get('ft-invoices')||[],clients:LS.get('ft-clients')||[],settings:LS.get('ft-settings')||null};
  if(d.entries.length||d.receipts.length||d.invoices.length||d.settings)setOld(d);
},[]);
const cut=allTime?'0000-00-00':TAX_YEAR_START;
const counts=d=>{
  const ok=x=>String(x||'').slice(0,10)>=cut;
  return{
    e:(d.entries||[]).filter(x=>ok(x.date)).length,
    r:(d.receipts||[]).filter(x=>ok(x.date)).length,
    i:(d.invoices||[]).filter(x=>ok(x.date)).length,
    c:(d.clients||[]).length
  };
};
const run=d=>{setResult(onImportOld(d,allTime));setConfirming(false);};
const handlePaste=()=>{
  try{
    const d=JSON.parse(pasteVal);
    if(!d||typeof d!=='object'||(!d.entries&&!d.invoices&&!d.receipts))throw new Error('no data');
    run(d);setPasteErr(null);setPasteOpen(false);
  }catch(e){setPasteErr('Could not read that. Paste the full JSON — in your old Google Sheet, open the hidden "_app_data" sheet and copy everything in cell A1.');}
};
const c=old?counts(old):null;
return(<Card style={{marginBottom:20,border:`1.5px solid ${T.accent}44`}}>
  <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:8}}><span style={{fontSize:18}}>📦</span><div style={{fontWeight:700,fontSize:15,flex:1}}>Transfer from Freelance Tracker</div></div>
  {result?(
    <div style={{background:T.lumpGreen+'10',border:`1px solid ${T.lumpGreen}44`,borderRadius:12,padding:'12px 14px'}}>
      <div style={{fontWeight:700,fontSize:13,color:T.lumpGreen,marginBottom:6}}>✓ Transfer complete</div>
      <div style={{fontSize:12,color:T.textMuted,lineHeight:1.7}}>Imported {result.invoices} invoice{result.invoices!==1?'s':''}, {result.entries} income entr{result.entries!==1?'ies':'y'}, {result.receipts} receipt{result.receipts!==1?'s':''} and {result.clients} client{result.clients!==1?'s':''}.{result.settings?' Your settings and rates came across too.':''} Your old app and its spreadsheet are untouched.</div>
    </div>
  ):(<>
    <div style={{fontSize:12,color:T.textMuted,lineHeight:1.6,marginBottom:12}}>One-tap copy of your old app's data into Honey. <strong style={{color:T.text}}>Read-only</strong> — nothing in the old app or its spreadsheet is changed, so it stays as your archive.</div>
    {old?(<>
      <div style={{background:'#f2f1ea',borderRadius:10,padding:'10px 12px',marginBottom:10,border:`1px solid ${T.border}`}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>{allTime?'Everything found':'This tax year (from '+fmtD(TAX_YEAR_START)+')'}</div>
        <div style={{fontSize:12,color:T.textMuted,lineHeight:1.7}}>{c.i} invoices · {c.e} income entries · {c.r} receipts · {c.c} clients{old.settings?' · settings':''}</div>
      </div>
      <label style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:T.textMuted,marginBottom:12,cursor:'pointer'}}>
        <input type="checkbox" checked={allTime} onChange={e=>setAllTime(e.target.checked)} style={{accentColor:T.accent}}/>
        <span>Include older history too (not just this tax year)</span>
      </label>
      {!confirming
        ?<Btn full onClick={()=>setConfirming(true)}>Import {allTime?'everything':'this tax year'}</Btn>
        :<div style={{display:'flex',gap:8}}>
          <Btn full color={T.lumpGreen} onClick={()=>run(old)}>Yes, import now</Btn>
          <Btn full outline color={T.textMuted} onClick={()=>setConfirming(false)}>Cancel</Btn>
        </div>}
    </>):(
      <div style={{fontSize:12,color:T.textMuted,lineHeight:1.6,marginBottom:10}}>No old app data found in this browser. If you used the old app here, open it once first so its data is available — or paste from your old spreadsheet below.</div>
    )}
    <button onClick={()=>setPasteOpen(s=>!s)} style={{background:'none',border:'none',color:T.accent,fontSize:12,fontWeight:700,padding:0,marginTop:10}}>{pasteOpen?'▲ Hide':'▼ Or paste data from your old spreadsheet'}</button>
    {pasteOpen&&(<div style={{marginTop:10}}>
      <div style={{fontSize:11,color:T.textMuted,lineHeight:1.6,marginBottom:8}}>In your old Google Sheet: right-click any sheet tab → unhide <strong style={{color:T.text}}>_app_data</strong> → copy the contents of cell A1 → paste here.</div>
      <TA placeholder='{"entries":[…],"receipts":[…],"invoices":[…]}' value={pasteVal} onChange={e=>setPasteVal(e.target.value)} style={{...iBase,resize:'vertical',minHeight:70,fontFamily:'Space Mono,monospace',fontSize:11}}/>
      {pasteErr&&<div style={{fontSize:11,color:T.danger,marginTop:6,lineHeight:1.5}}>{pasteErr}</div>}
      <Btn full small onClick={handlePaste} disabled={!pasteVal.trim()} style={{marginTop:8}}>Import pasted data</Btn>
    </div>)}
  </>)}
</Card>);}
