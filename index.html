<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#F2F1EA;color:#1A1A1A;font-family:'DM Sans',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
input,select,textarea,button{font-family:inherit;color:inherit}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:0}
input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{opacity:.55;cursor:pointer}
input:focus,select:focus,textarea:focus{outline:2px solid rgba(169,118,12,.30);border-color:#A9760C!important}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
pre{white-space:pre-wrap;word-break:break-all;font-family:'Space Mono',monospace}
</style>
<!-- Honey Flow dark theme (additive reskin) -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
body{background:#100f0b}
.hf-stage{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 90% at 50% 0%,#1c1a13,#0d0c09)}
.hf-frame{width:336px;border-radius:48px;padding:9px;background:#0C0B08;box-shadow:0 30px 70px -26px rgba(30,22,8,.6),0 2px 8px rgba(0,0,0,.18)}
.hf-scr{border-radius:40px;overflow:hidden;height:712px;position:relative;display:flex;flex-direction:column;background:#16140F;color:#F2EEE3}
.hf-handle{flex:none;padding:10px 0 2px;display:flex;justify-content:center;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none}
.hf-scr input,.hf-scr textarea,.hf-scr select{font-family:'Space Grotesk',system-ui,sans-serif}
.hf-scr input:focus,.hf-scr textarea:focus,.hf-scr select:focus{outline:none!important;border-color:#E0A92E!important}
.hf-scr textarea{resize:none}
.hf-scr input[type=time],.hf-scr input[type=date]{color-scheme:dark}
.hf-scr *::-webkit-scrollbar{width:0;height:0}
@media(max-width:480px){.hf-stage{padding:0;align-items:stretch}.hf-frame{width:100vw;border-radius:0;padding:0}.hf-scr{width:100%;height:100dvh;border-radius:0}}
@media(min-width:700px){.hf-stage{padding:0;align-items:stretch;justify-content:stretch}.hf-frame{width:100%;max-width:none;border-radius:0;padding:0;box-shadow:none;background:transparent}.hf-scr{border-radius:0;height:100dvh;width:100%}.hf-handle{display:none}}
</style>

<body>
<div id="gateOverlay" style="display:flex;position:fixed;inset:0;background:radial-gradient(120% 90% at 50% 0%,#1c1a13,#0d0c09);z-index:99999;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Grotesk',system-ui,sans-serif;">
  <div style="width:46px;height:46px;border-radius:14px;background:#E0A92E;display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 8px 24px -6px rgba(224,169,46,.5);"><span style="font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:800;color:#16140F;">H</span></div>
  <div id="gateTitle" style="font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:800;color:#F2EEE3;">Enter your PIN</div>
  <div id="gateSub" style="font-size:12.5px;color:#8A8576;margin-top:5px;">Honey is locked</div>
  <div id="gateDots" style="display:flex;gap:14px;margin:22px 0 4px;"></div>
  <div id="gateErr" style="height:18px;color:#E0705A;font-size:12.5px;font-weight:600;visibility:hidden;">Incorrect PIN</div>
  <div id="gatePad" style="display:grid;grid-template-columns:repeat(3,72px);gap:14px;margin-top:14px;"></div>
  <button id="gateForgot" style="margin-top:22px;background:none;border:none;color:#5C574B;font-size:11px;font-family:'Geist Mono',monospace;cursor:pointer;letter-spacing:.06em;">FORGOT PIN?</button>
</div>

<script type="text/babel" data-presets="react">
const{useState,useEffect,useRef}=React;
const T={bg:'#F2F1EA',surface:'#FFFFFF',border:'#E2DECF',text:'#1A1A1A',textMuted:'#6B6556',textFaint:'#BDB7A4',accent:'#A9760C',accentBright:'#C8941A',timed:'#3F6FB0',manual:'#7E4FB0',lumpGreen:'#2E7D5B',business:'#C2611F',reimb:'#4A66B0',drive:'#1A7A4A',danger:'#B8392F',dangerBg:'rgba(184,57,47,.10)',paid:'#2E7D5B',pending:'#A9760C'};
const TAX=0.20;
const EXPENSE_CATS=[
  ['office','Office supplies'],
  ['software','Software & subscriptions'],
  ['equipment','Equipment & hardware'],
  ['travel','Travel & transport'],
  ['mileage','Mileage'],
  ['meals','Meals (business)'],
  ['phone','Phone & internet'],
  ['marketing','Marketing & advertising'],
  ['training','Professional development'],
  ['insurance','Insurance'],
  ['bank','Bank & finance fees'],
  ['professional','Accountant & legal fees'],
  ['workspace','Workspace & rent'],
  ['website','Website & domain'],
  ['postage','Postage & shipping'],
  ['materials','Materials & stock'],
  ['utilities','Utilities (business portion)'],
  ['repairs','Repairs & maintenance'],
  ['other','Other']
];
const catLabel=k=>{const f=EXPENSE_CATS.find(c=>c[0]===k);return f?f[1]:'Uncategorised';};
const fmt=n=>'£'+Math.max(0,n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const today=()=>new Date().toISOString().split('T')[0];
const datesClose=(a,b)=>{if(!a||!b)return false;const da=new Date(String(a).slice(0,10)).getTime(),db=new Date(String(b).slice(0,10)).getTime();return isFinite(da)&&isFinite(db)&&Math.abs(da-db)<6*86400000;};
const fmtD=d=>d?new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'';
const mkId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const PROXY_URL='https://honey-proxy.phoenix-2bc.workers.dev';
const aiScanImage=async(dataUrl,isPdf)=>{
  const base64=dataUrl.split(',')[1];
  const mediaType=isPdf?'application/pdf':(dataUrl.match(/data:([^;]+);/)?.[1]||'image/jpeg');
  const catList=EXPENSE_CATS.map(c=>c[0]).join('|');
  const prompt='You are a receipt and invoice scanner. Extract these fields and respond with ONLY a valid JSON object, no other text, no markdown fences:\n{"vendor":"shop or client name","amount":number,"date":"YYYY-MM-DD","subcategory":"one of: '+catList+'","description":"short summary"}\n\nIf any field is unclear, use null. Date must be YYYY-MM-DD. Amount is the total in pounds as a number only.';
  const content=isPdf
    ?[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]
    :[{type:"image",source:{type:"base64",media_type:mediaType,data:base64}},{type:"text",text:prompt}];
  const res=await fetch(PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:500,messages:[{role:"user",content}]})});
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||'API error');
  const txt=(data.content||[]).map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
  return JSON.parse(txt);
};
const LS={get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};
const genSyncKey=()=>{const a=new Uint8Array(24);crypto.getRandomValues(a);return Array.from(a).map(b=>b.toString(16).padStart(2,'0')).join('');};
const mergeById=(local,server,srvWins)=>{const m=new Map();if(srvWins){local.forEach(x=>m.set(x.id,x));server.forEach(x=>m.set(x.id,x));}else{server.forEach(x=>m.set(x.id,x));local.forEach(x=>m.set(x.id,x));}return[...m.values()];};
const mergeTrash=(local,server)=>{const m=new Map();local.forEach(t=>m.set(t.item?.id||t.tid,t));server.forEach(t=>m.set(t.item?.id||t.tid,t));return[...m.values()];};

const Sheets={
  _url:'',init(url){this._url=url||'';},
  _jsonp(url,ms=12000){return new Promise((res,rej)=>{const cb='_gas'+Date.now()+Math.random().toString(36).slice(2);const sc=document.createElement('script');const t=setTimeout(()=>{cl();rej(new Error('Timeout'));},ms);const cl=()=>{delete window[cb];if(sc.parentNode)sc.parentNode.removeChild(sc);clearTimeout(t);};window[cb]=d=>{cl();res(d);};sc.onerror=()=>{cl();rej(new Error('Script load error'));};sc.src=url+(url.includes('?')?'&':'?')+'callback='+cb;document.head.appendChild(sc);});},
  async load(){if(!this._url)return null;try{return await this._jsonp(this._url+'?action=load');}catch{return null;}},
  async testDiag(){
    if(!this._url)return{ok:false,reason:'No URL entered'};
    if(!this._url.includes('/exec'))return{ok:false,reason:'URL must end in /exec — copy it from Deploy → Manage deployments.'};
    let reachable=false;
    try{await fetch(this._url+'?action=ping',{method:'GET',mode:'no-cors'});reachable=true;}catch{}
    try{
      const d=await this._jsonp(this._url+'?action=load',12000);
      if(d&&typeof d==='object'&&!d.error)return{ok:true};
      if(d?.error)return{ok:false,reason:'Script error: '+d.error};
      return{ok:false,reason:'Script returned unexpected data — try re-deploying.'};
    }catch(e){
      const m=e.message||'';
      if(m.includes('Timeout')){
        return reachable
          ?{ok:false,reason:'Script reached but no response. Fix: in Apps Script set "Who has access" to Anyone (not "Anyone with Google account"), then re-deploy and re-authorise.',hint:'access'}
          :{ok:false,reason:'Timed out — check your internet connection and the URL.',hint:'timeout'};
      }
      return reachable
        ?{ok:false,reason:'Server responded but script did not. Re-open Apps Script → Deploy → Manage Deployments → Edit → set Who has access to Anyone → Deploy. Then re-authorise all permissions.',hint:'access'}
        :{ok:false,reason:'Could not reach the script. Paste the full URL from Deploy → Manage Deployments. It should end in /exec.',hint:'url'};
    }
  },
  async save(data){if(!this._url)return false;try{const r=(data.receipts||[]).map(r=>r.driveUrl?{...r,imageData:null}:r);await fetch(this._url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({...data,receipts:r})});return true;}catch{return false;}},
  async createInvoice(inv,settings){if(!this._url)return null;try{const slim={invoiceNum:inv.invoiceNum,client:inv.client,clientEmail:inv.clientEmail||'',clientAddress:inv.clientAddress||'',dueDate:inv.dueDate||'',notes:inv.notes||'',grandTotal:inv.grandTotal,incomeTotal:inv.incomeTotal||0,reimbTotal:inv.reimbTotal||0,payRef:settings.payRef||'',invoicePeriod:inv.invoicePeriod||'',entries:(inv.selEntries||[]).map(e=>({date:e.date,client:e.client||'',description:e.description||'',subtotal:e.subtotal,hours:e.hours||0,rate:e.rate||0,type:e.type})),reimbs:(inv.selReimbs||[]).map(r=>({date:r.date,description:r.description||'',amount:r.amount,driveUrl:r.driveUrl||''}))};const payload={invoice:slim,settings:{name:settings.name||'',business:settings.business||'',email:settings.email||'',payRef:settings.payRef||''}};const encoded=encodeURIComponent(JSON.stringify(payload));if(encoded.length>7000)return{err:'Invoice data too large for URL.'};const d=await this._jsonp(this._url+'?action=createInvoice&data='+encoded,30000);if(d?.url)return{url:d.url};return{err:d?.error||'No URL returned'};}catch(e){return{err:e.message||'Failed'};}},
  async uploadReceipt(receipt){if(!this._url||!receipt.imageData)return null;try{const r=await fetch(this._url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'uploadReceipt',receipt:{id:receipt.id,description:receipt.description||'Receipt',date:receipt.date||'',imageData:receipt.imageData,imageName:receipt.imageName||'receipt.jpg',category:receipt.category||'business'}})});const d=await r.json();return d.driveUrl||null;}catch{return null;}},
  async scanGmailReceipts(){if(!this._url)return null;try{return await this._jsonp(this._url+'?action=scanReceipts',35000);}catch{return null;}},
  async scanFolders(seen){if(!this._url)return null;try{return await this._jsonp(this._url+'?action=scanFolders'+(seen?'&seen='+encodeURIComponent(seen):''),60000);}catch(e){return{error:e.message||'failed'};}},
  async labelProcessed(ids){if(!this._url||!ids||!ids.length)return;try{await this._jsonp(this._url+'?action=labelProcessed&ids='+ids.join(','),15000);}catch{}},
  async deleteReceiptFiles(threadId,driveFileId){if(!this._url)return;try{return await this._jsonp(this._url+'?action=deleteReceiptFiles&threadId='+encodeURIComponent(threadId||'')+'&driveFileId='+encodeURIComponent(driveFileId||''),15000);}catch{return null;}},
  async moveToFolder(fileId,category){if(!this._url||!fileId)return;try{return await this._jsonp(this._url+'?action=moveToFolder&fileId='+encodeURIComponent(fileId)+'&category='+encodeURIComponent(category),10000);}catch{return null;}},
};

</script>
