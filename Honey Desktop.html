document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-family:'Geist Mono',monospace\">\n                <span style=\"font-size:13px;color:#6B6556\">£/hr<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:176px 1fr;align-items:center;gap:16px\">\n              <label style=\"font-size:13px;color:#6B6556\">Tax set-aside<\u002Flabel>\n              <div style=\"display:flex;align-items:center;gap:10px\">\n                <input defaultvalue=\"20\" style=\"height:40px;background:#211E17;border:1px solid #322D23;border-radius:10px;padding:0 14px;font-size:14px;width:88px;font-family:'Geist Mono',monospace\">\n                <span style=\"font-size:13px;color:#6B6556\">%<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:176px 1fr;align-items:center;gap:16px\">\n              <label style=\"font-size:13px;color:#6B6556\">Payment terms<\u002Flabel>\n              <div style=\"display:flex;align-items:center;gap:10px\">\n                <input defaultvalue=\"30\" style=\"height:40px;background:#211E17;border:1px solid #322D23;border-radius:10px;padding:0 14px;font-size:14px;width:88px;font-family:'Geist Mono',monospace\">\n                <span style=\"font-size:13px;color:#6B6556\">days<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:176px 1fr;align-items:center;gap:16px\">\n              <label style=\"font-size:13px;color:#6B6556\">Invoice prefix<\u002Flabel>\n              <input defaultvalue=\"INV-2026-\" style=\"height:40px;background:#211E17;border:1px solid #322D23;border-radius:10px;padding:0 14px;font-size:14px;width:100%;font-family:'Geist Mono',monospace\">\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:176px 1fr;align-items:flex-start;gap:16px;padding-top:3px\">\n              <label style=\"font-size:13px;color:#6B6556;padding-top:11px\">Invoice foote ont-family:'Geist Mono',monospace;flex:none;transition:all .3s\">{{ pl0Icon }}<\u002Fdiv>\n              <span style=\"font-size:13.5px;color:{{ pl0LabelColor }};transition:color .3s\">{{ pl0Label }}<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font-family:'Geist Mono',monospace;font-size:12px;color:{{ pl0DetailColor }};white-space:nowrap;transition:color .3s\">{{ pl0Detail }}<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Line 1 -->\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #221F1A;gap:12px\">\n            <div style=\"display:flex;align-items:center;gap:11px;flex:1;min-width:0\">\n              <div style=\"width:22px;height:22px;border-radius:50%;background:{{ pl1IconBg }};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:{{ pl1IconColor }};font-family:'Geist Mono',monospace;flex:none;transition:all .3s\">{{ pl1Icon }}<\u002Fdiv>\n              <span style=\"font-size:13.5px;color:{{ pl1LabelColor }};transition:color .3s\">{{ pl1Label }}<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font-family:'Geist Mono',monospace;font-size:12px;color:{{ pl1DetailColor }};white-space:nowrap;transition:color .3s\">{{ pl1Detail }}<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Line 2 -->\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #221F1A;gap:12px\">\n            <div style=\"display:flex;align-items:center;gap:11px;flex:1;min-width:0\">\n              <div style=\"width:22px;height:22px;border-radius:50%;background:{{ pl2IconBg }};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:{{ pl2IconColor }};font-family:'Geist Mono',monospace;flex:none;transition:all .3s\">{{ pl2Icon }}<\u002Fdiv>\n              <span style=\"font-size:13.5px;color:{{ pl2LabelColor }};transition:color .3s\">{{ pl2Label }}<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font-family:'Geist Mono',monospace;font-size:12px;color:{{ pl2DetailColor }};white-space:nowrap;transition:color .3s\">{{ pl2Detail }}<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Line 3 -->\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px;gap:12px\">\n            <div style=\"display:flex;align-items:center;gap:11px;flex:1;min-width:0\">\n              <div style=\"width:22px;height:22px;border-radius:50%;background:{{ pl3IconBg }};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:{{ pl3IconColor }};font-family:'Geist Mono',monospace;flex:none;transition:all .3s\">{{ pl3Icon }}<\u002Fdiv>\n              <span style=\"font-size:13.5px;color:{{ pl3LabelColor }};transition:color .3s\">{{ pl3Label }}<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font-family:'Geist Mono',monospace;font-size:12px;color:{{ pl3DetailColor }};white-space:nowrap;transition:color .3s\">{{ pl3Detail }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ processingDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:22px;animation:fadeUp .3s\">\n            <button onclick=\"{{ goToStep3 }}\" style=\"width:100%;height:48px;border-radius:13px;background:#E0A92E;border:none;font-size:15px;font-weight:700;color:#16140F;cursor:pointer\">Review 31 items →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- STEP 3: Review table -->\n    <sc-if value=\"{{ catchupStep3 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0\">\n        <!-- Header -->\n        <div style=\"padding:22px 22px 14px;flex:none\">\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px\">\n            <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:800;color:#F2EEE3;margin:0;letter-spacing:-.01em\">Review before importing<\u002Fh2>\n            <span style=\"font-family:'Geist Mono',monospace;font-size:11px;color:#8A8576\">47 bank rows found<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:13px;color:#8A8576;margin:0 0 14px;line-height:1.5\">Nothing saved yet. Tick rows to import.<\u002Fp>\n          <!-- Column headers -->\n          <div style=\"display:grid;grid-template-columns:28px 1fr 1fr 130px;gap:8px;padding:0 10px\">\n            <div><\u002Fdiv>\n            <div style=\"font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.1em;color:#5C574B\">BANK ROW<\u002Fdiv>\n            <div style=\"font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.1em;color:#5C574B\">MATCHED TO<\u002Fdiv>\n            <div style=\"font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.1em;color:#5C574B\">STATUS<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"height:1px;background:#2A2520;margin-top:8px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Scrollable rows -->\n        <div style=\"flex:1;overflow-y:auto;padding:6px 22px 4px\">\n          <sc-for list=\"{{ reviewRows }}\" as=\"row\" hint-placeholder-count=\"7\">\n            <div onclick=\"{{ row.toggle }}\" style=\"display:grid;grid-template-columns:28px 1fr 1fr 130px;gap:8px;align-items:center;padding:10px 10px;border-radius:10px;cursor:pointer;margin-bottom:3px;background:{{ row.rowBg }};transition:background .1s\">\n              <!-- Checkbox -->\n              <div style=\"width:19px;height:19px;border-radius:5px;border:1.5px solid {{ row.checkBorderColor }};background:{{ row.checkBg }};display:flex;align-items:center;justify-content:center;flex:none;transition:all .15s\">\n                <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16140F\" stroke-width=\"2.8\" stroke-linecap=\"round\" style=\"opacity:{{ row.checkOpacity }};transition:opacity .15s\"><path d=\"M5 12l4 4L19 6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <!-- Bank row -->\n              <div>\n                <div style=\"display:flex;align-items:center;gap:7px\">\n                  <span style=\"font-family:'Geist Mono',monospace;font-size:13px;font-weight:600;color:{{ row.amtColor }}\">{{ row.amount }}<\u002Fspan>\n                  <span style=\"font-size:11px;color:#5C574B\">{{ row.date }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:11px;color:#8A8576;margin-top:1px\">{{ row.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n              <!-- Matched to -->\n              <div style=\"font-size:12px;color:#C9C3B4;line-height:1.4\">{{ row.matched }}<\u002Fdiv>\n              <!-- Status -->\n              <div style=\"display:flex;align-items:center;gap:5px\">\n                <span style=\"font-size:12px;color:{{ row.iconColor }}\">{{ row.icon }}<\u002Fspan>\n                <span style=\"font-size:11px;color:{{ row.statusColor }};line-height:1.3\">{{ row.statusLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <!-- Footer -->\n        <div style=\"padding:14px 22px 20px;border-top:1px solid #2A2520;flex:none\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px\">\n            <div style=\"display:flex;gap:8px\">\n              <button onclick=\"{{ deselectAll }}\" style=\"height:34px;padding:0 14px;border-radius:8px;background:transparent;border:1px solid #322D23;font-size:12px;color:#8A8576;cursor:pointer\">Deselect all<\u002Fbutton>\n              <button onclick=\"{{ selectAllNew }}\" style=\"height:34px;padding:0 14px;border-radius:8px;background:transparent;border:1px solid #322D23;font-size:12px;color:#8A8576;cursor:pointer\">Select all new<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-size:11px\">\n              <span style=\"color:#5BBF8A\">✓ Approve<\u002Fspan>\n              <span style=\"color:#E0A92E\">⚠ Review<\u002Fspan>\n              <span style=\"color:#5C574B\">✗ Skip<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ goToStep4 }}\" style=\"width:100%;height:48px;border-radius:13px;background:#E0A92E;border:none;font-size:15px;font-weight:700;color:#16140F;cursor:pointer\">Import {{ approvedCount }} approved items →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- STEP 4: Done -->\n    <sc-if value=\"{{ catchupStep4 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:28px 26px 28px\">\n        <div style=\"width:46px;height:46px;border-radius:13px;background:#5BBF8A16;display:flex;align-items:center;justify-content:center;margin-bottom:16px\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5BBF8A\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M22 11.08V12a10 10 0 11-5.93-9.14\"><\u002Fpath><path d=\"M22 4L12 14.01l-3-3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:800;color:#F2EEE3;margin:0 0 5px;letter-spacing:-.01em\">{{ approvedCount }} records imported.<\u002Fh2>\n        <p style=\"font-size:14px;color:#8A8576;margin:0 0 24px;line-height:1.55\">Your books are up to date.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:26px\">\n          <div style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;background:#211E17\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5BBF8A\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M5 12l4 4L19 6\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:13px;color:#C9C3B4\">18 income entries logged<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;background:#211E17\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5BBF8A\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M5 12l4 4L19 6\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:13px;color:#C9C3B4\">4 invoices matched to payments<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;background:#211E17\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5BBF8A\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M5 12l4 4L19 6\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:13px;color:#C9C3B4\">9 receipts categorised<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;background:#1A1813\">\n            <div style=\"width:15px;height:1px;background:#5C574B;flex:none\"><\u002Fdiv>\n            <span style=\"font-size:13px;color:#5C574B\">5 items skipped (already existed)<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;background:#1A1813\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E0A92E\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg>\n            <span style=\"font-size:13px;color:#8A8576\">3 bank rows unmatched — check them in Income<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px\">\n          <button onclick=\"{{ closeCatchup }}\" style=\"flex:1;height:46px;border-radius:12px;background:#211E17;border:1px solid #322D23;font-size:14px;font-weight:600;color:#F2EEE3;cursor:pointer\">Go to Home<\u002Fbutton>\n          <button style=\"flex:1;height:46px;border-radius:12px;background:#E0A92E;border:none;font-size:14px;font-weight:700;color:#16140F;cursor:pointer\">Review unmatched →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    view: 'settings',\n    catchupStep: 0,\n    processingStarted: false,\n    processingDone: false,\n    processingLines: [\n      { label: 'Reading your bank CSV…', done: false, detail: null },\n      { label: 'Scanning invoices (4 files)…', done: false, detail: null },\n      { label: 'Scanning receipts (12 files)…', done: false, detail: null },\n      { label: 'Cross-referencing…', done: false, detail: null },\n    ],\n    reviewRows: [\n      { id: 'r1', amount: '£2,400', date: '14 Mar', desc: 'Acme Corp', matched: 'Invoice INV-042', status: 'new', checked: true },\n      { id: 'r2', amount: '£5,200', date: '28 Mar', desc: 'Studio B', matched: 'Invoice INV-043', status: 'new', checked: true },\n      { id: 'r3', amount: '£3,800', date: '15 Feb', desc: 'Brightside Ltd', matched: 'Invoice INV-039', status: 'new', checked: true },\n      { id: 'r4', amount: '£1,200', date: '05 Apr', desc: 'Lena Studio', matched: 'INV-044 (low confidence)', status: 'review', checked: false },\n      { id: 'r5', amount: '£850', date: '02 Feb', desc: 'BACS ref 774291', matched: 'No invoice found', status: 'unmatched', checked: false },\n      { id: 'r6', amount: '£2,400', date: '01 Jan', desc: 'Acme Corp', matched: 'Already in Honey (#12)', status: 'exists', checked: false },\n      { id: 'r7', amount: '-£18.50', date: '09 Mar', desc: 'Bolt', matched: 'Receipt match', status: 'receipt', checked: true },\n      { id: 'r8', amount: '-£42.00', date: '22 Mar', desc: 'Adobe Inc', matched: 'Receipt match', status: 'receipt', checked: true },\n      { id: 'r9', amount: '-£14.30', date: '11 Apr', desc: 'Pret a Manger', matched: 'Receipt match', status: 'receipt', checked: true },\n    ],\n    uploadedFiles: { bank: null, invoices: null, receipts: null, reimbursements: null },\n    sheetsSetupOpen: false,\n    logMode: 'hours',\n    logClient: null,\n    logShowSend: false,\n    invoiceTab: 'all',\n    clients: [\n      { id: 1, name: 'Acme Corp', email: 'accounts@acme.com' },\n      { id: 2, name: 'Brightside', email: 'hello@brightside.co' },\n      { id: 3, name: 'Lena Studio', email: 'lena@lenastudio.io' },\n      { id: 4, name: 'Studio B', email: 'billing@studiob.com' },\n    ],\n  };\n\n  componentDidUpdate(prevProps, prevState) {\n    const s = this.state;\n    if (prevState && prevState.catchupStep !== 2 && s.catchupStep === 2 && !s.processingStarted) {\n      this.setState({ processingStarted: true });\n      this.runProcessing();\n    }\n  }\n\n  runProcessing() {\n    const steps = [\n      { idx: 0, delay: 1000, detail: '47 transactions found' },\n      { idx: 1, delay: 2800, detail: '4 invoices read · £12,400 total' },\n      { idx: 2, delay: 4600, detail: '12 receipts scanned' },\n      { idx: 3, delay: 6000, detail: 'Complete — 31 items ready' },\n    ];\n    steps.forEach(({ idx, delay, detail }) => {\n      setTimeout(() => {\n        this.setState(s => ({\n          processingLines: s.processingLines.map((l, i) =>\n            i === idx ? { ...l, done: true, detail } : l\n          )\n        }));\n      }, delay);\n    });\n    setTimeout(() => this.setState({ processingDone: true }), 6800);\n  }\n\n  flatLine(lines, idx, prefix) {\n    const l = this.procLine(lines, idx);\n    return {\n      [prefix + 'Icon']: l.icon,\n      [prefix + 'IconBg']: l.iconBg,\n      [prefix + 'IconColor']: l.iconColor,\n      [prefix + 'LabelColor']: l.labelColor,\n      [prefix + 'Label']: l.label,\n      [prefix + 'DetailColor']: l.detailColor,\n      [prefix + 'Detail']: l.detail,\n    };\n  }\n\n  procLine(lines, idx) {\n    const line = lines[idx];\n    const prevDone = idx === 0 || lines[idx - 1].done;\n    const active = !line.done && prevDone && this.state.processingStarted;\n    return {\n      label: line.label,\n      icon: line.done ? '✓' : active ? '◉' : '○',\n      iconColor: line.done ? '#5BBF8A' : active ? '#E0A92E' : '#3A352A',\n      iconBg: line.done ? '#5BBF8A18' : active ? '#E0A92E18' : '#1A1813',\n      labelColor: line.done ? '#F2EEE3' : active ? '#F2EEE3' : '#3A352A',\n      detail: line.done ? line.detail : (active ? 'Working…' : 'Waiting…'),\n      detailColor: line.done ? '#5BBF8A' : active ? '#8A8576' : '#2A2520',\n    };\n  }\n\n  upload(bucket, label) {\n    return () => this.setState(s => ({ uploadedFiles: { ...s.uploadedFiles, [bucket]: label } }));\n  }\n\n  bucketProps(bucket, emptyLabel) {\n    const f = this.state.uploadedFiles[bucket];\n    return {\n      uploaded: !!f,\n      borderColor: f ? '#5BBF8A' : '#2A2520',\n      bg: f ? '#5BBF8A08' : 'transparent',\n      fileColor: f ? '#5BBF8A' : '#5C574B',\n      fileLabel: f || emptyLabel,\n    };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const nb = (v) => s.view === v ? 'rgba(224,169,46,.1)' : 'transparent';\n    const nc = (v) => s.view === v ? '#E0A92E' : '#8A8576';\n\n    const bank = this.bucketProps('bank', 'Drop or browse');\n    const inv  = this.bucketProps('invoices', 'Drop or browse');\n    const rec  = this.bucketProps('receipts', 'Drop or browse');\n    const reim = this.bucketProps('reimbursements', 'Drop or browse');\n\n    const reviewRows = s.reviewRows.map((r, i) => {\n      const statusMap = {\n        new:       { icon: '✓', iconColor: '#5BBF8A', label: 'New — approve?',   color: '#5BBF8A' },\n        review:    { icon: '⚠', iconColor: '#E0A92E', label: 'Low confidence',    color: '#E0A92E' },\n        unmatched: { icon: '⚠', iconColor: '#E0A92E', label: 'Unmatched',         color: '#E0A92E' },\n        exists:    { icon: '✗', iconColor: '#5C574B', label: 'Already in Honey',  color: '#5C574B' },\n        receipt:   { icon: '✓', iconColor: '#7E62C0', label: 'Receipt match',     color: '#7E62C0' },\n      }[r.status] || { icon: '○', iconColor: '#8A8576', label: '', color: '#8A8576' };\n      return {\n        ...r,\n        icon: statusMap.icon,\n        iconColor: statusMap.iconColor,\n        statusLabel: statusMap.label,\n        statusColor: statusMap.color,\n        amtColor: r.amount.startsWith('-') ? '#8A8576' : (r.status === 'exists' ? '#5C574B' : '#F2EEE3'),\n        rowBg: r.status === 'exists' ? '#181614' : r.checked ? '#211E17' : '#1A1813',\n        checkBg: r.checked ? '#E0A92E' : 'transparent',\n        checkBorderColor: r.checked ? '#E0A92E' : '#3A352A',\n        checkOpacity: r.checked ? 1 : 0,\n        toggle: () => this.setState(s2 => ({\n          reviewRows: s2.reviewRows.map((row, j) => j === i ? { ...row, checked: !row.checked } : row)\n        })),\n      };\n    });\n\n    const lines = s.processingLines;\n\n    return {\n      // Nav\n      navHome:     () => this.setState({ view: 'home' }),\n      navLog:      () => this.setState({ view: 'log' }),\n      navInvoice:  () => this.setState({ view: 'invoice' }),\n      navSnap:     () => this.setState({ view: 'snap' }),\n      navSheets:   () => this.setState({ view: 'sheets' }),\n      navFiles:    () => this.setState({ view: 'files' }),\n      navSettings: () => this.setState({ view: 'settings' }),\n      navHomeBg:      nb('home'),     navHomeColor:     nc('home'),\n      navLogBg:       nb('log'),      navLogColor:      nc('log'),\n      navInvoiceBg:   nb('invoice'),  navInvoiceColor:  nc('invoice'),\n      navSnapBg:      nb('snap'),     navSnapColor:     nc('snap'),\n      navSheetsBg:    nb('sheets'),   navSheetsColor:   nc('sheets'),\n      navFilesBg:     nb('files'),    navFilesColor:    nc('files'),\n      navSettingsBg:  nb('settings'), navSettingsColor: nc('settings'),\n\n      // Views\n      showSettings: s.view === 'settings',\n      showHome:     s.view === 'home',\n      showLog:      s.view === 'log',\n      showInvoice:  s.view === 'invoice',\n      showSnap:     s.view === 'snap',\n      showSheets:   s.view === 'sheets',\n      showFiles:    s.view === 'files',\n\n      // Log form\n      logHours: s.logMode === 'hours',\n      logLump:  s.logMode === 'lump',\n      setLogHours: () => this.setState({ logMode: 'hours', logShowSend: false }),\n      setLogLump:  () => this.setState({ logMode: 'lump',  logShowSend: false }),\n      logModeHoursBg:    s.logMode === 'hours' ? '#3F6FB0' : 'transparent',\n      logModeLumpBg:     s.logMode === 'lump'  ? '#B07A12' : 'transparent',\n      logModeHoursColor: s.logMode === 'hours' ? '#fff' : '#5C574B',\n      logModeLumpColor:  s.logMode === 'lump'  ? '#fff' : '#5C574B',\n      logClients: ['Acme Corp', 'Brightside', 'Lena Studio', 'Studio B'].map(name => ({\n        name,\n        bg:     s.logClient === name ? '#E0A92E' : '#211E17',\n        color:  s.logClient === name ? '#16140F' : '#8A8576',\n        border: s.logClient === name ? '#E0A92E' : '#322D23',\n        select: () => this.setState({ logClient: name }),\n      })),\n      logShowSend: s.logShowSend,\n      openSend:  () => this.setState({ logShowSend: true }),\n      closeSend: () => this.setState({ logShowSend: false }),\n      logClientEmail: s.logClient === 'Acme Corp' ? 'accounts@acme.com' : s.logClient === 'Brightside' ? 'hello@brightside.co' : s.logClient === 'Lena Studio' ? 'lena@lenastudio.io' : s.logClient === 'Studio B' ? 'billing@studiob.com' : '',\n\n      // Invoice\n      invoiceAll:    () => this.setState({ invoiceTab: 'all' }),\n      invoiceUnpaid: () => this.setState({ invoiceTab: 'unpaid' }),\n      invoicePaid:   () => this.setState({ invoiceTab: 'paid' }),\n      invoiceTabAl
